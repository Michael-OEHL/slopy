<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Slopy</title>
<meta name="theme-color" content="#F7F8FA">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="light-content">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2D72C8;
  --blue-dark:#1a5ba8;
  --blue-tint:#EBF2FB;
  --blue-soft:rgba(45,114,200,0.08);
  --obsidian:#14141A;
  --snow:#F7F8FA;
  --white:#FFFFFF;
  --g50:#F9FAFB;
  --g100:#F0F2F5;
  --g200:#E2E6EA;
  --g300:#C8CDD4;
  --g400:#9AA3AE;
  --g500:#6B7684;
  --g600:#5A6472;
  --green:#16A34A;
  --green-tint:#DCFCE7;
  --amber:#D97706;
  --amber-tint:#FEF3C7;
  --red:#DC2626;
  --red-tint:#FEE2E2;
  --fd:'Josefin Sans',sans-serif;
  --fb:'Inter',sans-serif;
  --r:14px;
  --rs:10px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.06);
  --shadow:0 1px 4px rgba(0,0,0,0.08),0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg:0 4px 16px rgba(0,0,0,0.1),0 12px 32px rgba(0,0,0,0.08);
}

html,body{
  height:100%;
  background:var(--snow);
  color:var(--obsidian);
  font-family:var(--fb);
  font-size:16px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
#app{
  max-width:430px;
  margin:0 auto;
  min-height:100%;
  background:var(--white);
  position:relative;
  overflow-x:hidden;
}

/* ── LOGO SVG ─────────────────────────────────────────── */
.logo-svg{display:block;flex-shrink:0}

/* ── LOADING ──────────────────────────────────────────── */
.load-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;background:var(--white)}
.load-pulse{animation:pulse-logo 1.8s ease-in-out infinite}
@keyframes pulse-logo{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.96)}}
.load-dots{display:flex;gap:6px}
.load-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);opacity:.3;animation:dot-anim 1.2s ease-in-out infinite}
.load-dot:nth-child(2){animation-delay:.2s}
.load-dot:nth-child(3){animation-delay:.4s}
@keyframes dot-anim{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* ── AUTH ─────────────────────────────────────────────── */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 28px;text-align:center;background:var(--white)}
.auth-logo-wrap{margin-bottom:32px}
.auth-tagline{font-family:var(--fd);font-size:.75rem;font-weight:200;letter-spacing:.25em;text-transform:uppercase;color:var(--g500);margin-bottom:40px}
.auth-form{width:100%;max-width:320px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0}
.auth-divider span{font-size:.75rem;color:var(--g400);white-space:nowrap}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--g200)}

/* ── INPUTS ───────────────────────────────────────────── */
.field{margin-bottom:14px}
.field-label{display:block;font-size:.72rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--g500);margin-bottom:6px}
.input{
  width:100%;padding:13px 14px;
  background:var(--snow);
  border:1.5px solid var(--g200);
  border-radius:var(--rs);
  font-family:var(--fb);font-size:.95rem;
  color:var(--obsidian);
  outline:none;
  transition:border-color .15s,background .15s;
  -webkit-appearance:none;
}
.input:focus{border-color:var(--blue);background:var(--white)}
.input::placeholder{color:var(--g400)}
.input:disabled{opacity:.5;cursor:not-allowed}

/* ── BUTTONS ──────────────────────────────────────────── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px 20px;
  border-radius:var(--rs);
  font-family:var(--fb);font-size:.9rem;font-weight:500;
  cursor:pointer;border:none;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.55;cursor:default;transform:none}
.btn-primary{background:var(--blue);color:var(--white)}
.btn-primary:hover:not(:disabled){background:var(--blue-dark)}
.btn-secondary{background:var(--blue-tint);color:var(--blue)}
.btn-secondary:hover:not(:disabled){background:#dceaf8}
.btn-ghost{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}
.btn-ghost:hover:not(:disabled){background:var(--blue-soft)}
.btn-danger{background:var(--red-tint);color:var(--red)}
.btn-sm{padding:9px 16px;font-size:.82rem;width:auto;border-radius:var(--rs)}
.btn-xs{padding:6px 12px;font-size:.75rem;width:auto;border-radius:8px}
.spin-btn{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.spin-btn-blue{border-color:rgba(45,114,200,.3);border-top-color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOPBAR ───────────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--g100);
  padding:0 20px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-wordmark{font-family:var(--fd);font-weight:200;font-size:1rem;letter-spacing:6px;color:var(--blue);text-transform:lowercase}
.topbar-title{font-family:var(--fd);font-weight:200;font-size:.85rem;letter-spacing:5px;text-transform:lowercase;color:var(--obsidian)}

/* ── BOTTOM NAV ───────────────────────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--g100);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
  z-index:50;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:10px 0 8px;
  background:none;border:none;cursor:pointer;
  font-family:var(--fb);font-size:10px;font-weight:400;
  color:var(--g400);transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.nav-item.active{color:var(--blue);font-weight:500}
.nav-item svg{width:22px;height:22px;stroke-width:1.6;transition:transform .15s}
.nav-item.active svg{transform:scale(1.08)}

/* ── SCREEN ───────────────────────────────────────────── */
.screen{padding:20px 20px 110px;min-height:calc(100vh - 56px)}
.screen-full{padding:0;min-height:calc(100vh - 56px)}

/* ── BACK BUTTON ──────────────────────────────────────── */
.back-btn{
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;gap:4px;
  font-size:.875rem;color:var(--blue);
  padding:4px;margin:-4px;
  -webkit-tap-highlight-color:transparent;
}

/* ── CARDS ────────────────────────────────────────────── */
.card{
  background:var(--white);
  border:1px solid var(--g200);
  border-radius:var(--r);
  padding:16px;
  margin-bottom:10px;
  box-shadow:var(--shadow-sm);
}
.card-interactive{cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.card-interactive:active{transform:scale(.99);background:var(--g50)}
.card-selected{border-color:var(--blue);background:var(--blue-soft);border-width:1.5px}
.card-selected .chip{background:var(--blue-tint);color:var(--blue);border-color:rgba(45,114,200,.2)}
.card-highlight{border-color:var(--blue);background:linear-gradient(135deg,var(--blue-soft),rgba(45,114,200,.04));border-width:1.5px}

/* ── CHIPS / BADGES ───────────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;border:1px solid transparent}
.chip-blue{background:var(--blue-tint);color:var(--blue)}
.chip-green{background:var(--green-tint);color:var(--green)}
.chip-amber{background:var(--amber-tint);color:var(--amber)}
.chip-red{background:var(--red-tint);color:var(--red)}
.chip-gray{background:var(--g100);color:var(--g600)}
.chip-outline{background:transparent;border-color:var(--g200);color:var(--g600)}

/* Status → color */
.s-booked,.s-pickup_scheduled{background:var(--amber-tint);color:var(--amber)}
.s-dropped_off,.s-in_transit{background:var(--amber-tint);color:var(--amber)}
.s-in_service,.s-quality_check{background:var(--blue-tint);color:var(--blue)}
.s-ready,.s-return_transit{background:var(--green-tint);color:var(--green)}
.s-completed{background:var(--g100);color:var(--g500)}
.s-cancelled{background:var(--red-tint);color:var(--red)}

/* ── SECTION HEADER ───────────────────────────────────── */
.section-label{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g500);margin-bottom:10px;margin-top:4px}
.page-title{font-family:var(--fd);font-weight:200;font-size:1.8rem;letter-spacing:.04em;line-height:1.2;margin-bottom:4px}
.page-subtitle{font-size:.875rem;color:var(--g500);margin-bottom:20px}

/* ── HEALTH RING ──────────────────────────────────────── */
.health-ring-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.health-ring-label{position:absolute;text-align:center}
.health-ring-value{font-family:var(--fd);font-weight:300;font-size:.95rem;line-height:1;color:var(--obsidian)}
.health-ring-unit{font-size:.6rem;color:var(--g500)}

/* ── PROGRESS BAR ─────────────────────────────────────── */
.progress-track{display:flex;gap:3px;height:3px}
.progress-seg{flex:1;border-radius:2px;background:var(--g200);transition:background .3s}
.progress-seg.filled{background:var(--blue)}
.progress-seg.filled.complete{background:var(--green)}

/* ── STEPS INDICATOR ──────────────────────────────────── */
.steps-row{display:flex;align-items:center;margin-bottom:24px}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;transition:all .2s}
.step-circle.done{background:var(--green);color:#fff}
.step-circle.active{background:var(--blue);color:#fff}
.step-circle.pending{background:var(--g100);color:var(--g500)}
.step-line{flex:1;height:2px;background:var(--g200);transition:background .2s}
.step-line.done{background:var(--green)}

/* ── TRACKING STEPPER ─────────────────────────────────── */
.tracking-step{display:flex;gap:14px;padding:10px 0;align-items:flex-start}
.tracking-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;border:2px solid var(--g200)}
.tracking-dot.done{background:var(--green);border-color:var(--green)}
.tracking-dot.active{background:var(--blue);border-color:var(--blue);box-shadow:0 0 0 5px rgba(45,114,200,.12)}
.tracking-dot.pending{background:var(--white);border-color:var(--g200)}

/* ── AVATAR ───────────────────────────────────────────── */
.avatar{border-radius:50%;background:var(--blue-tint);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:300;color:var(--blue);flex-shrink:0}

/* ── TOAST ────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--obsidian);color:var(--white);
  padding:11px 20px;border-radius:var(--rs);
  font-size:.85rem;font-weight:400;
  opacity:0;transition:all .25s;
  z-index:500;pointer-events:none;
  white-space:nowrap;max-width:calc(100% - 40px);
  text-align:center;
  box-shadow:var(--shadow-lg);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── DIVIDER ──────────────────────────────────────────── */
.divider{height:1px;background:var(--g100);margin:14px 0}

/* ── SELECT ───────────────────────────────────────────── */
.status-select{
  font-family:var(--fb);font-size:.82rem;font-weight:500;
  padding:8px 12px;border-radius:var(--rs);
  border:1.5px solid var(--g200);background:var(--snow);
  color:var(--obsidian);cursor:pointer;outline:none;flex:1;
  -webkit-appearance:none;
}

/* ── ADMIN SPECIFIC ───────────────────────────────────── */
.admin-wrap{background:var(--g50);min-height:100vh}
.admin-topbar{
  position:sticky;top:0;z-index:50;
  background:var(--obsidian);
  padding:0 20px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
}
.admin-topbar-logo{display:flex;align-items:center;gap:10px}
.admin-topbar-wordmark{font-family:var(--fd);font-weight:200;font-size:1rem;letter-spacing:6px;color:var(--white);text-transform:lowercase}
.admin-badge{font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.1)}
.admin-screen{padding:20px 20px 40px}
.admin-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.admin-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.admin-stat{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm)}
.admin-stat-value{font-family:var(--fd);font-weight:200;font-size:2rem;letter-spacing:.02em;color:var(--blue);line-height:1;margin-bottom:4px}
.admin-stat-label{font-size:.72rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)}

/* ── GRID 2 ───────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── SUCCESS ──────────────────────────────────────────── */
.success-ico{width:64px;height:64px;border-radius:50%;background:var(--green-tint);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* ── EMPTY STATE ──────────────────────────────────────── */
.empty{text-align:center;padding:52px 20px}
.empty-icon{font-size:3rem;margin-bottom:14px;opacity:.6}

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .3s ease forwards}

/* ── NOTIFICATIONS ─────────────────────────────────────── */
.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--white)}
.notif-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--g100);align-items:flex-start}
.notif-item:last-child{border-bottom:none}
.notif-icon{width:36px;height:36px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;background:var(--blue-tint)}
.notif-unread{background:var(--blue-soft);margin:-2px -2px;padding:2px 2px;border-radius:var(--rs)}

/* ── ADMIN ANALYTICS ────────────────────────────────────── */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.analytics-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.analytics-value{font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:1.8rem;letter-spacing:.02em;color:var(--blue);line-height:1;margin-bottom:3px}
.analytics-label{font-size:.7rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--g500)}
.analytics-trend{font-size:.72rem;margin-top:4px}
.analytics-trend.up{color:var(--green)}
.analytics-trend.down{color:var(--red)}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;padding-top:8px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{width:100%;background:var(--blue-tint);border-radius:3px 3px 0 0;transition:height .6s ease;min-height:3px;cursor:pointer;position:relative}
.bar:hover{background:var(--blue)}
.bar-lbl{font-size:9px;color:var(--g500);font-family:'Josefin Sans',sans-serif;font-weight:200;letter-spacing:.04em}
.pkg-dist{display:flex;gap:0;border-radius:var(--rs);overflow:hidden;height:10px;margin:10px 0}
.pkg-seg{transition:width .6s ease;cursor:pointer}
.pkg-leg{display:flex;gap:14px;flex-wrap:wrap}
.pkg-leg-item{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--g600)}
.pkg-leg-dot{width:8px;height:8px;border-radius:2px}
.chart-section{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chart-title{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g500);margin-bottom:14px}

/* ── FILTER BAR ─────────────────────────────────────────── */
.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{font-size:.75rem;font-weight:500;padding:6px 14px;border-radius:20px;border:1.5px solid var(--g200);background:var(--white);color:var(--g600);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.filter-chip.active{background:var(--blue);border-color:var(--blue);color:var(--white)}

/* ── PDF PASS ───────────────────────────────────────────── */
.pass-preview{background:linear-gradient(135deg,#0d1f35,#0a1828);border-radius:var(--r);padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.pass-preview::after{content:'';position:absolute;bottom:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(45,114,200,.12),transparent 70%)}
.pass-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.pass-logo-text{font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:.9rem;letter-spacing:6px;color:var(--blue);text-transform:lowercase}
.pass-certified{font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);background:rgba(45,114,200,.2);padding:3px 10px;border-radius:2px}
.pass-value{font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:2.4rem;color:#fff;letter-spacing:.02em;line-height:1;margin-bottom:4px}
.pass-change{font-size:.78rem;color:#4ade80;margin-bottom:16px}
.pass-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
.pass-stat-label{font-size:.62rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.pass-stat-value{font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:.9rem;color:#fff}

/* ── ADMIN TABS ─────────────────────────────────────────── */
.admin-tabs{display:flex;gap:0;border-bottom:1px solid var(--g200);margin-bottom:20px}
.admin-tab{flex:1;padding:12px 8px;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;color:var(--g500);border-bottom:2px solid transparent;transition:all .15s;text-align:center}
.admin-tab.active{color:var(--blue);border-bottom-color:var(--blue)}


/* ── ONBOARDING ──────────────────────────────────────────── */
.onboard-wrap{min-height:100vh;display:flex;flex-direction:column;background:var(--white)}
.onboard-progress{display:flex;gap:4px;padding:16px 20px 0}
.onboard-seg{flex:1;height:3px;border-radius:2px;background:var(--g200);transition:background .3s}
.onboard-seg.done{background:var(--blue)}
.onboard-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center}
.onboard-icon{font-size:4rem;margin-bottom:20px;animation:fadeUp .4s ease}
.onboard-title{font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:1.8rem;letter-spacing:.04em;margin-bottom:10px;line-height:1.2}
.onboard-body{font-size:.9rem;color:var(--g500);line-height:1.75;max-width:280px;margin-bottom:32px}
.onboard-footer{padding:20px 24px 36px;display:flex;flex-direction:column;gap:10px}

/* ── DSGVO / LEGAL ───────────────────────────────────────── */
.legal-wrap{padding:20px 20px 60px;max-width:600px}
.legal-h1{font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:1.6rem;letter-spacing:.04em;margin-bottom:6px}
.legal-date{font-size:.78rem;color:var(--g500);margin-bottom:24px}
.legal-h2{font-family:'Josefin Sans',sans-serif;font-weight:300;font-size:1rem;letter-spacing:.04em;margin:20px 0 8px}
.legal-p{font-size:.875rem;color:var(--g600);line-height:1.8;margin-bottom:10px}
.legal-ul{padding-left:18px;margin-bottom:10px}
.legal-ul li{font-size:.875rem;color:var(--g600);line-height:1.8;margin-bottom:4px}

/* ── COOKIE BANNER ───────────────────────────────────────── */
#cookie-banner{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--obsidian);color:var(--white);padding:16px 20px;z-index:1000;display:none}
#cookie-banner.show{display:block}
.cookie-text{font-size:.78rem;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:12px}
.cookie-btns{display:flex;gap:8px}
.cookie-btn-accept{flex:1;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);padding:10px;font-size:.82rem;font-weight:500;cursor:pointer}
.cookie-btn-reject{flex:1;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:none;border-radius:var(--rs);padding:10px;font-size:.82rem;cursor:pointer}

/* ── EDIT ASSET ───────────────────────────────────────────── */
.asset-actions{display:flex;gap:8px;margin-top:10px}

/* ── QR CODE ─────────────────────────────────────────────── */
.qr-wrap{background:var(--white);border:2px solid var(--g200);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:12px}
.qr-id{font-family:monospace;font-size:1.1rem;font-weight:700;color:var(--blue);letter-spacing:.1em;margin-top:10px}
.qr-hint{font-size:.75rem;color:var(--g500);margin-top:4px}

/* ── STAR RATING ─────────────────────────────────────────── */
.stars{display:flex;gap:6px;justify-content:center;margin:16px 0}
.star{font-size:2rem;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.4}
.star.active{filter:none;opacity:1;transform:scale(1.1)}
.star:hover{transform:scale(1.15)}

/* ── MULTI-ASSET BOOKING ─────────────────────────────────── */
.asset-check{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--g200);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .15s}
.asset-check.checked{border-color:var(--blue);background:var(--blue-soft)}
.asset-check-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--g300);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.asset-check.checked .asset-check-box{background:var(--blue);border-color:var(--blue)}

/* ── CAPACITY / CALENDAR ─────────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.7rem;cursor:pointer;position:relative;transition:all .15s}
.cal-day-num{font-weight:500;line-height:1}
.cal-day-count{font-size:.55rem;color:var(--g500);margin-top:1px}
.cal-day.empty-cap{background:var(--green-tint);color:var(--green)}
.cal-day.half-cap{background:var(--amber-tint);color:var(--amber)}
.cal-day.full-cap{background:var(--red-tint);color:var(--red)}
.cal-day.today{box-shadow:0 0 0 2px var(--blue);font-weight:700}
.cal-day.past{opacity:.35;cursor:default}
.cal-hdr{font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--g500);text-align:center;padding:4px 0}

/* ── SERVICE REMINDER ────────────────────────────────────── */
.reminder-card{background:linear-gradient(135deg,var(--blue-tint),rgba(45,114,200,.04));border:1.5px solid rgba(45,114,200,.2);border-radius:var(--r);padding:16px;margin-bottom:14px}

/* ── B2B ─────────────────────────────────────────────────── */
.b2b-tag{font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:linear-gradient(135deg,#1e3a5f,#2D72C8);color:#fff;padding:3px 10px;border-radius:2px}

/* ── STRIPE ──────────────────────────────────────────────── */
.stripe-form{background:var(--snow);border:1.5px solid var(--g200);border-radius:var(--r);padding:16px;margin-bottom:14px}
.stripe-row{display:flex;gap:10px}
.stripe-badge{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--g500);justify-content:center;margin-top:10px}

const toast = (m,ms=3000) => {

  if(!el) return;
  el.textContent = m; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
};
const fmtDate = d => d ? new Date(d).toLocaleDateString('de-AT',{day:'numeric',month:'short',year:'numeric'}) : '—';
const fmtEur  = n => Number(n||0).toFixed(2).replace('.',',') + ' €';
const fmtPct  = n => Math.round(n||0) + '%';

const esc     = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const setL    = v => { S.loading=v; document.querySelectorAll('.btn-primary').forEach(b=>b.disabled=v); };
const getHour = () => new Date().getHours();
const greeting = () => getHour()<12 ? 'Guten Morgen' : getHour()<18 ? 'Guten Tag' : 'Guten Abend';
const healthColor = v => v >= 70 ? '#16A34A' : v >= 40 ? '#D97706' : '#DC2626';
const healthOverall = a => Math.round(((a.edge_health||100)+(a.base_health||100)+(a.wax_health||100))/3);
const initials = (n,e) => { if(n){const p=n.trim().split(' ');return((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase();} return (e?.[0]||'').toUpperCase(); };
const badgeClass = s => {
  if(['booked','pickup_scheduled','dropped_off','in_transit'].includes(s)) return 'chip s-booked';
  if(['in_service','quality_check'].includes(s)) return 'chip s-in_service';
  if(['ready','return_transit'].includes(s)) return 'chip s-ready';
  if(s==='completed') return 'chip s-completed';
  if(s==='cancelled') return 'chip s-cancelled';
  return 'chip chip-gray';
};


// Notifications
function addNotification(booking, newStatus) {
  const n = {
    id: Date.now(),
    booking_id: booking.id,
    asset: booking.assets?.brand + ' ' + booking.assets?.model,
    status: newStatus,
    time: new Date(),
    read: false
  };
  S.notifications.unshift(n);
  // Persist in localStorage
  try { localStorage.setItem('slopy_notifs_' + S.user?.id, JSON.stringify(S.notifications.slice(0,20))); } catch(e){}
}

function loadNotifications() {
  try {
    const saved = localStorage.getItem('slopy_notifs_' + S.user?.id);
    if(saved) S.notifications = JSON.parse(saved);
  } catch(e){}
}

function markNotifsRead() {
  S.notifications = S.notifications.map(n => ({...n, read:true}));
  try { localStorage.setItem('slopy_notifs_' + S.user?.id, JSON.stringify(S.notifications.slice(0,20))); } catch(e){}
}

const unreadCount = () => S.notifications.filter(n=>!n.read).length;

// Analytics helpers
function getMonthlyRevenue() {
  const months = {};
  S.bookings.forEach(b => {
    if(b.status === 'cancelled') return;
    const d = new Date(b.created_at);
    const key = d.toLocaleDateString('de-AT',{month:'short'});
    months[key] = (months[key]||0) + Number(b.price||0);
  });
  return months;
}

function getPkgDistribution() {
  const dist = {essential:0, performance:0, world_cup:0};
  S.bookings.forEach(b => { if(dist[b.service_package]!==undefined) dist[b.service_package]++; });
  const total = Object.values(dist).reduce((a,b)=>a+b,0);
  return { dist, total };
}

function getLogisticsDistribution() {
  const dist = {};
  S.bookings.forEach(b => { dist[b.logistics_type] = (dist[b.logistics_type]||0)+1; });
  return dist;
}

function avgOrderValue() {
  const valid = S.bookings.filter(b=>b.status!=='cancelled');
  if(!valid.length) return 0;
  return valid.reduce((s,b)=>s+Number(b.price||0),0)/valid.length;
}

// Resale value estimate
function estimateResaleValue(assets, bookings) {
  if(!assets || !assets.length) return 0;
  const asset = assets[0];
  const purchaseEst = 800; // avg premium ski value
  const serviceCount = bookings.filter(b=>b.status==='completed').length;
  const health = Math.round(((asset.edge_health||100)+(asset.base_health||100)+(asset.wax_health||100))/3);
  const base = purchaseEst * 0.6;
  const healthBonus = (health/100) * (purchaseEst * 0.25);
  const serviceBonus = Math.min(serviceCount * 30, 150);
  return Math.round(base + healthBonus + serviceBonus);
}

// ── Health Ring SVG ───────────────────────────────────────
function healthRing(value, size=64, label) {
  const r = (size-8)/2;
  const circ = 2*Math.PI*r;
  const offset = circ * (1 - Math.min(value,100)/100);
  const color = healthColor(value);
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div class="health-ring-wrap" style="width:${size}px;height:${size}px;">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#F0F2F5" stroke-width="6"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
          style="transition:stroke-dashoffset 1s ease"/>
      </svg>
      <div class="health-ring-label">
        <div class="health-ring-value" style="color:${color}">${Math.round(value)}</div>
      </div>
    </div>
    <div style="font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--g500)">${label}</div>
  </div>`;
}

// ── Progress Bar ──────────────────────────────────────────
function progressBar(status) {
  const keys = STATUS_FLOW.map(s=>s.key);
  const idx = keys.indexOf(status);
  const done = status === 'completed';
  return `<div class="progress-track">${STATUS_FLOW.slice(0,6).map((_,i) =>
    `<div class="progress-seg ${i<=idx?'filled':''}${done?' complete':''}"></div>`
  ).join('')}</div>`;
}

// ── Steps Indicator ───────────────────────────────────────
function stepsIndicator(current) {
  return `<div class="steps-row">${[1,2,3,4].map((n,i) => {
    const cls = n<current?'done':n===current?'active':'pending';
    return (i>0?`<div class="step-line ${n<=current?'done':''}"></div>`:'')+
      `<div class="step-circle ${cls}">${n<current?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':n}</div>`;
  }).join('')}</div>`;
}

        <button class="btn btn-secondary btn-sm" onclick="A.go('pass-${bid}')" style="flex:1;">Digital Pass</button>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════════
// CAPACITY PLANNING (Point 15)
// ════════════════════════════════════════════════════════════
function vCapacity() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay() || 7; // Mon=1
  const MAX_PER_DAY = 8;

  // Count bookings per day
  const counts = {};
  S.bookings.forEach(b => {
    if(['completed','cancelled'].includes(b.status)) return;
    const d = new Date(b.created_at);
    if(d.getMonth()===month && d.getFullYear()===year) {
      const key = d.getDate();
      counts[key] = (counts[key]||0)+1;
    }
  });

  const monthName = today.toLocaleDateString('de-AT',{month:'long',year:'numeric'});
  const days = ['Mo','Di','Mi','Do','Fr','Sa','So'];

  return `<div class="admin-wrap">
    <div class="admin-topbar">
      <div class="admin-topbar-logo">
        <svg class="logo-svg" width="28" height="28" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <circle cx="200" cy="200" r="195" fill="rgba(255,255,255,0.15)"/>
          <path d="M 226,80 C 271,67 120,116 124,160 C 128,200 232,191 232,235 C 232,271 125,284 143,290" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round"/>
          <path d="M 196,93 C 238,83 147,127 151,169 C 155,207 196,200 196,242 C 196,276 148,284 163,290" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.42"/>
        </svg>
        <span class="admin-topbar-wordmark">slopy</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="admin-badge">Kapazität</span>
        <button class="btn btn-xs" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);" onclick="A.nav('admin')">← Aufträge</button>
      </div>
    </div>
    <div class="admin-screen fade-up">
      <div style="margin-bottom:16px;">
        <div class="page-title">${monthName}</div>
        <div style="font-size:.78rem;color:var(--g500);">Kapazität: max. ${MAX_PER_DAY} Aufträge/Tag</div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <div style="display:flex;gap:8px;font-size:.72rem;">
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--green-tint);display:inline-block;"></span>Frei</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--amber-tint);display:inline-block;"></span>Halb</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--red-tint);display:inline-block;"></span>Voll</span>
        </div>
      <div class="cal-grid">
        ${days.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}
        ${Array(firstDay-1).fill('<div></div>').join('')}
        ${Array.from({length:daysInMonth},(_,i)=>{
          const day = i+1;
          const count = counts[day]||0;
          const isToday = day===today.getDate();
          const isPast = new Date(year,month,day) < new Date(today.setHours(0,0,0,0));
          const capClass = count===0?'empty-cap':count<MAX_PER_DAY*0.6?'empty-cap':count<MAX_PER_DAY?'half-cap':'full-cap';
          return `<div class="cal-day ${capClass} ${isToday?'today':''} ${isPast?'past':''}">
            <div class="cal-day-num">${day}</div>
            ${count>0?`<div class="cal-day-count">${count}/${MAX_PER_DAY}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      <div class="divider"></div>
      <div class="section-label">Aktive Aufträge diese Woche</div>
      ${S.bookings.filter(b=>{
        if(['completed','cancelled'].includes(b.status)) return false;
        const d=new Date(b.created_at);
        const now=new Date();
        const weekAgo=new Date(now-7*24*60*60*1000);
        return d>=weekAgo;
      }).map(b=>`
        <div class="admin-card" style="margin-bottom:8px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div style="font-weight:500;font-size:.875rem;">${esc(b.assets?.brand||'')} ${esc(b.assets?.model||'')}</div>
              <div style="font-size:.75rem;color:var(--g500);">${fmtDate(b.created_at)} · ${PKG[b.service_package]?.name}</div>
            </div>
            <span class="${badgeClass(b.status)}">${slabel(b.status)}</span>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function go(view) {
  S.view = view;
  if(rtCh) { db.removeChannel(rtCh); rtCh = null; }
  const app = document.getElementById('app');
  if(!app) return;

  if(view.startsWith('tracking-')) {
    app.innerHTML = vTracking(view.replace('tracking-',''));
  } else if(view.startsWith('pass-')) {
    app.innerHTML = vProductPass(view.replace('pass-',''));
  } else if(view.startsWith('qr-')) {
    app.innerHTML = vQRCode(view.replace('qr-',''));
  } else if(view.startsWith('rate-')) {
    S.rating = { bookingId: view.replace('rate-',''), stars: 0 };
    app.innerHTML = vRating(view.replace('rate-',''));
  } else if(view.startsWith('edit-asset-')) {
    app.innerHTML = vEditAsset(view.replace('edit-asset-',''));
  } else {
    switch(view) {
      case 'auth':            app.innerHTML = vAuth();           break;
      case 'pw-reset':        app.innerHTML = vPwReset();        break;
      case 'pw-reset-sent':   app.innerHTML = vPwResetSent();    break;
      case 'home':            app.innerHTML = vHome();           subCustomer(); loadNotifications(); break;
      case 'profile':         app.innerHTML = vProfile();        break;
      case 'notifications':   app.innerHTML = vNotifications();  break;
      case 'book-1':          app.innerHTML = vBook1Multi();     break;
      case 'book-asset':      app.innerHTML = vBookAsset();      break;
      case 'book-2':          app.innerHTML = vBook2();          break;
      case 'book-3':          app.innerHTML = vBook3();          break;
      case 'book-4':          app.innerHTML = vBook4();          break;
      case 'book-stripe':     app.innerHTML = vStripeCheckout(); break;
      case 'book-confirm':    app.innerHTML = vBookConfirm();    break;
      case 'my-bookings':     app.innerHTML = vMyBookings();     subCustomer(); break;
      case 'admin':           app.innerHTML = vAdmin();          subAdmin(); break;
      case 'admin-analytics': app.innerHTML = vAdminAnalytics(); break;
      case 'admin-capacity':  app.innerHTML = vCapacity();       break;
      case 'dsgvo':           app.innerHTML = vDSGVO();          break;
      case 'agb':             app.innerHTML = vAGB();            break;
      case 'impressum':       app.innerHTML = vImpressum();      break;
      case 'onboard':         app.innerHTML = vOnboard();        break;
      case 'b2b':             app.innerHTML = vB2B();            break;
      default:                app.innerHTML = vAuth();
    }
  }
  window.scrollTo(0,0);
}

// ── Realtime ──────────────────────────────────────────────
function subCustomer() {
  if(!S.user || rtCh) return;
  rtCh = db.channel('rt-customer')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'bookings', filter:`user_id=eq.${S.user.id}` }, p => {
      S.bookings = S.bookings.map(b => b.id===p.new.id ? {...b,...p.new} : b);
      toast('Status aktualisiert: ' + slabel(p.new.status));
      if(S.view === 'home' || S.view === 'my-bookings') go(S.view);
    }).subscribe();
}

function subAdmin() {
  if(rtCh) return;
  rtCh = db.channel('rt-admin')
    .on('postgres_changes', { event:'*', schema:'public', table:'bookings' }, async p => {
      if(p.eventType === 'INSERT') {
        const { data } = await db.from('bookings').select('*,assets(*),profiles(*)').eq('id',p.new.id).single();
        if(data) S.bookings.unshift(data);
        toast('Neue Buchung eingegangen!');
      } else if(p.eventType === 'UPDATE') {
        S.bookings = S.bookings.map(b => b.id===p.new.id ? {...b,...p.new} : b);
      }
      go('admin');
    }).subscribe();
}

// ── Auth ──────────────────────────────────────────────────
async function login() {
  const email = document.getElementById('auth-email')?.value?.trim();
  const pw = document.getElementById('auth-pw')?.value;
  if(!email || !pw) { toast('Bitte E-Mail und Passwort eingeben'); return; }
  setL(true);
  const { error } = await db.auth.signInWithPassword({ email, password:pw });
  setL(false);
  if(error) { toast('Falsche E-Mail oder falsches Passwort'); return; }
}

async function register() {
  const email = document.getElementById('auth-email')?.value?.trim();
  const pw = document.getElementById('auth-pw')?.value;
  if(!email || !pw) { toast('Bitte E-Mail und Passwort eingeben'); return; }
  if(pw.length < 6) { toast('Passwort muss mind. 6 Zeichen haben'); return; }
  setL(true);
  const { error } = await db.auth.signUp({ email, password:pw });
  setL(false);
  if(error) { toast('Fehler: ' + error.message); return; }
  toast('Konto erstellt!');
}

async function logout() {
  if(rtCh) { db.removeChannel(rtCh); rtCh = null; }
  await db.auth.signOut();
  S.user = null; S.profile = null; S.assets = []; S.bookings = [];
  go('auth');
}

// ── Data ──────────────────────────────────────────────────
async function loadProfile(user) {
  S.user = user;
  const { data } = await db.from('profiles').select('*').eq('id', user.id).single();
  if(data) { S.profile = data; return; }
  // New user — insert fresh profile
  const { data: ins } = await db.from('profiles').insert({ id:user.id, email:user.email, role:'customer' }).select().single();
  if(ins) { S.profile = ins; return; }
  // RLS fallback — should not happen for valid users
  S.profile = { id:user.id, email:user.email, role:'customer', full_name:null, phone:null };
}

async function loadAssets() {
  if(!S.user) return;
  const { data } = await db.from('assets').select('*').eq('user_id', S.user.id).order('created_at', { ascending:false });
  S.assets = data || [];
}

async function loadMyBookings() {
  if(!S.user) return;
  const { data } = await db.from('bookings').select('*, assets(*)').eq('user_id', S.user.id).order('created_at', { ascending:false });
  S.bookings = data || [];
}

async function loadAllBookings() {
  const { data } = await db.from('bookings').select('*, assets(*), profiles(*)').order('created_at', { ascending:false });
  S.bookings = data || [];
}

async function addAsset() {
  const a = S.newAsset;
  if(!a.brand.trim() || !a.model.trim()) { toast('Marke und Modell sind Pflichtfelder'); return; }
  setL(true);
  const { data, error } = await db.from('assets').insert({
    user_id: S.user.id, type:'ski',
    brand: a.brand.trim(), model: a.model.trim(),
    length_cm: a.len ? parseInt(a.len) : null,
    year: a.year ? parseInt(a.year) : null
  }).select().single();
  setL(false);
  if(error) { toast('Fehler: ' + error.message); return; }
  S.assets.unshift(data);
  S.draft.asset_id = data.id;
  S.draft.asset = data;
  S.newAsset = { brand:'', model:'', len:'', year:'', type:'ski' };
  toast('Ski gespeichert');
  go('book-2');
}

async function createBooking() {
  if(!S.draft.asset_id) { toast('Bitte Ski auswählen'); return; }
  const pkg = PKG[S.draft.pkg];
  if(!pkg) return;
  setL(true);
  const est = new Date();
  est.setDate(est.getDate() + pkg.days + 2);
  const { data, error } = await db.from('bookings').insert({
    user_id: S.user.id,
    asset_id: S.draft.asset_id,
    service_package: S.draft.pkg,
    logistics_type: S.draft.log,
    logistics_address: S.draft.addr || null,
    logistics_notes: S.draft.notes || null,
    price: pkg.price,
    status: 'booked',
    estimated_completion: est.toISOString().split('T')[0]
  }).select().single();
  setL(false);
  if(error) { toast('Fehler: ' + error.message); console.error(error); return; }
  S.bookings.unshift({ ...data, assets: S.draft.asset });
  S.confirmed = { ...data, assets: S.draft.asset };
  go('book-confirm');
}

async function updateStatus(id, newStatus) {
  if(!newStatus) return;
  const { error } = await db.from('bookings').update({ status: newStatus }).eq('id', id);
  if(error) { toast('Fehler beim Update'); return; }
  const updated = S.bookings.find(b=>b.id===id);
  S.bookings = S.bookings.map(b => b.id===id ? {...b, status:newStatus} : b);
  // Add notification for customer
  if(updated) addNotification({...updated, assets:updated.assets}, newStatus);
  toast('Status: ' + slabel(newStatus));
  go('admin');
}

async function saveProfile() {
  const name  = document.getElementById('pf-name')?.value?.trim();
  const phone = document.getElementById('pf-phone')?.value?.trim();
  setL(true);
  const { error } = await db.from('profiles').update({ full_name:name||null, phone:phone||null }).eq('id', S.user.id);
  setL(false);
  if(error) { toast('Fehler: ' + error.message); return; }
  S.profile = { ...S.profile, full_name:name, phone };
  toast('Profil gespeichert');
  go('profile');
}

  try {

function initPWA() {
  const manifest = {
    name: 'Slopy', short_name: 'Slopy',
    start_url: '/', display: 'standalone',
    theme_color: '#2D72C8', background_color: '#F7F8FA',
    icons: [{ src: 'data:image/svg+xml;base64,' + btoa('<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"><circle cx="200" cy="200" r="200" fill="#2D72C8"/></svg>'), sizes: '192x192', type: 'image/svg+xml' }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  let link = document.querySelector('link[rel="manifest"]');
  if(!link) { link = document.createElement('link'); link.rel = 'manifest'; document.head.appendChild(link); }
  link.href = url;
}

  const hasActive = S.bookings.some(b=>b.asset_id===id&&!['completed','cancelled'].includes(b.status));

  if(!confirm('Ski wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.')) return;

  setL(false);

  S.assets = S.assets.filter(a=>a.id!==id);

  A.nav('home');

// ── Multi-Asset Toggle ────────────────────────────────────
function toggleAsset(id) {
  if(!S.selectedAssets) S.selectedAssets = [];
  const idx = S.selectedAssets.indexOf(id);
  if(idx >= 0) S.selectedAssets.splice(idx, 1);
  else S.selectedAssets.push(id);
  // Also set primary asset_id
  S.draft.asset_id = S.selectedAssets[0] || null;
  S.draft.asset = S.assets.find(a=>a.id===S.draft.asset_id);
  go('book-1');
}

// ── Payment Processing ────────────────────────────────────
async function processPayment() {
  const name = document.getElementById('cc-name')?.value?.trim();
  const num  = document.getElementById('cc-num')?.value?.replace(/\s/g,'');
  const exp  = document.getElementById('cc-exp')?.value?.trim();
  const cvc  = document.getElementById('cc-cvc')?.value?.trim();
  if(!name||num.length<15||exp.length<4||cvc.length<3) {
    toast('Bitte alle Felder ausfüllen');
    return;
  }
  // STRIPE HOOK — when ready:
  // const { paymentIntent } = await stripe.confirmCardPayment(clientSecret, { payment_method: { card: cardElement } })
  toast('Zahlung verarbeitet ✓', 2000);
  await createBooking();
}

// ── Rating ────────────────────────────────────────────────
function setStar(n, bid) {
  S.rating = { bookingId: bid, stars: n };
  go('rate-' + bid);
}

async function submitRating(bid) {
  if(!S.rating.stars) { toast('Bitte Sterne auswählen'); return; }
  const note = document.getElementById('rating-note')?.value?.trim();
  setL(true);
  // Store rating in admin_notes as prefix
  const ratingText = `⭐ ${S.rating.stars}/5${note?' — '+note:''}`;
  const b = S.bookings.find(x=>x.id===bid);
  const existingNotes = b?.admin_notes || '';
  const newNotes = existingNotes ? existingNotes + ' | Kundenbewertung: ' + ratingText : 'Kundenbewertung: ' + ratingText;
  const { error } = await db.from('bookings').update({ admin_notes: newNotes }).eq('id', bid);
  setL(false);
  if(error) { toast('Fehler beim Speichern'); return; }
  S.bookings = S.bookings.map(b => b.id===bid ? {...b, admin_notes:newNotes} : b);
  toast('Bewertung gespeichert — Danke!');
  A.nav('my-bookings');
}

// ── Admin Notes ───────────────────────────────────────────
async function saveAdminNote(bid) {
  const note = document.getElementById('admin-note-'+bid)?.value?.trim();
  const { error } = await db.from('bookings').update({ admin_notes: note }).eq('id', bid);
  if(error) { toast('Fehler'); return; }
  S.bookings = S.bookings.map(b => b.id===bid ? {...b, admin_notes:note} : b);
  toast('Notiz gespeichert');
}

// ── Password Reset ────────────────────────────────────────
async function sendPwReset() {
  const email = document.getElementById('reset-email')?.value?.trim();
  if(!email) { toast('Bitte E-Mail eingeben'); return; }
  setL(true);
  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '?reset=true'
  });
  setL(false);
  if(error) { toast('Fehler: ' + error.message); return; }
  go('pw-reset-sent');
}

// ── Admin Tab / Filter ────────────────────────────────────
function setAdminTab(tab) {
  S.adminTab = tab;
  if(tab === 'active') S.adminFilter = 'all';
  else if(tab === 'completed') S.adminFilter = 'completed';
  else S.adminFilter = 'all';
  go('admin');
}

function setAdminFilter(filter) {
  S.adminFilter = filter;
  go('admin');
}

  sendPwReset, setAdminTab, setAdminFilter, exportPDF,
  nextOnboard, skipOnboard, saveAsset, deleteAsset, toggleAsset, processPayment, setStar, submitRating, saveAdminNote,

  selectPkg(id)   { S.draft.pkg=id; go('book-2'); },
  selectLog(id)   { S.draft.log=id; go('book-3'); },
  setD(k,v)  { S.draft[k]=v; },
  setNA(k,v) { S.newAsset[k]=v; },
  async nav(view) {
    if(rtCh) { db.removeChannel(rtCh); rtCh=null; }
    if(view==='home')             { await loadAssets(); await loadMyBookings(); go('home'); }
    else if(view==='book-1')      { await loadAssets(); S.draft={asset_id:null,asset:null,pkg:'performance',log:'home',addr:'',notes:''}; go('book-1'); }
    else if(view==='my-bookings') { await loadMyBookings(); go('my-bookings'); }
    else if(view==='profile')     { await loadAssets(); await loadMyBookings(); go('profile'); }
    else if(view==='admin')       { await loadAllBookings(); go('admin'); }
    else if(view==='admin-analytics') { await loadAllBookings(); go('admin-analytics'); }
    else if(view==='notifications')   { go('notifications'); }
    else if(view==='pass')            { await loadMyBookings(); go('pass-'); }
    else go(view);
  }
};

// ── Init ──────────────────────────────────────────────────
async function init() {
  const { data:{ session } } = await db.auth.getSession();
  if(session) {
    await loadProfile(session.user);
    await loadAssets();
    await loadMyBookings();
    // ROLE SEPARATION: admin → admin view, customer → home view
    if(S.profile?.role === 'admin') {
      await loadAllBookings();
      go('admin');
    } else {
      go('home');
    }
  } else {
    go('auth');
  }

  db.auth.onAuthStateChange(async (event, session) => {
    if(event === 'SIGNED_IN' && session) {
      await loadProfile(session.user);
      await loadAssets();
      await loadMyBookings();
      if(S.profile?.role === 'admin') {
        await loadAllBookings();
        go('admin');
      } else {
        if(!checkOnboard()) go('home');
      }
    } else if(event === 'SIGNED_OUT') {
      go('auth');
    }
  });
}

};
