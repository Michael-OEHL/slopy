<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Slopy</title>
<meta name="theme-color" content="#2D72C8">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2D72C8;--blue-mid:#1a5ba8;--blue-tint:#EBF2FB;
  --obsidian:#14141A;--snow:#F7F8FA;
  --g100:#F0F2F5;--g200:#E2E6EA;--g400:#9AA3AE;--g600:#5A6472;
  --green:#16A34A;--gtint:#DCFCE7;
  --amber:#D97706;--atint:#FEF3C7;
  --red:#DC2626;--rtint:#FEE2E2;
  --fd:'Josefin Sans',sans-serif;--fb:'Inter',sans-serif;
  --r:12px;--rs:8px;
}
html,body{height:100%;background:var(--snow);color:var(--obsidian);font-family:var(--fb);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100%;background:#fff;position:relative}
.spin{border:2.5px solid var(--blue-tint);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ls{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px}
.bw{background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lt{font-family:var(--fd);font-weight:200;font-size:2rem;letter-spacing:8px;color:var(--blue);text-transform:lowercase}
.hl{font-family:var(--fd);font-weight:200;font-size:2rem;letter-spacing:3px;line-height:1.2}
.lbl{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--g600)}
.mu{color:var(--g600);font-size:.875rem}
.tb{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--g100);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.tbt{font-family:var(--fd);font-weight:300;font-size:.95rem;letter-spacing:4px;text-transform:lowercase}
.sc{padding:20px 20px 100px}
.bb{background:none;border:none;cursor:pointer;padding:6px;margin:-6px;color:var(--blue);display:flex;align-items:center;gap:4px;font-size:.875rem}
.bn{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--g100);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:50}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:10px;font-weight:400;color:var(--g400);transition:color .2s}
.ni.on{color:var(--blue);font-weight:500}
.ni svg{width:22px;height:22px;stroke-width:1.5}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;border-radius:var(--r);font-family:var(--fb);font-size:.9rem;font-weight:500;cursor:pointer;border:none;transition:all .2s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;cursor:default;transform:none}
.bp{background:var(--blue);color:#fff}.bp:hover:not(:disabled){background:var(--blue-mid)}
.bs{background:var(--blue-tint);color:var(--blue)}
.bg{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}
.bsm{padding:8px 14px;font-size:.8rem;width:auto;border-radius:var(--rs)}
.ig{margin-bottom:14px}
.il{display:block;font-size:.8rem;font-weight:500;color:var(--g600);margin-bottom:5px}
.inp{width:100%;padding:11px 13px;background:var(--snow);border:1.5px solid var(--g200);border-radius:var(--rs);font-family:var(--fb);font-size:.95rem;color:var(--obsidian);outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--blue);background:#fff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cs{cursor:pointer;transition:all .2s;border:1.5px solid var(--g200)}
.cs:hover{border-color:var(--blue)}
.cs.on{border-color:var(--blue);background:var(--blue-tint)}
.cs.on .ft{background:rgba(45,114,200,.12);color:var(--blue)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.sb{background:var(--atint);color:var(--amber)}
.si{background:var(--blue-tint);color:var(--blue)}
.sr{background:var(--gtint);color:var(--green)}
.sc2{background:var(--g100);color:var(--g600)}
.sca{background:var(--rtint);color:var(--red)}
.sts{display:flex;align-items:center;margin-bottom:24px}
.sd2{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.sd2.d{background:var(--green);color:#fff}
.sd2.a{background:var(--blue);color:#fff}
.sd2.p{background:var(--g100);color:var(--g600)}
.sl2{flex:1;height:2px;background:var(--g100)}
.sl2.d{background:var(--green)}
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--obsidian);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:.85rem;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;max-width:calc(100% - 40px);text-align:center;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.aw{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center}
.pp{font-family:var(--fd);font-weight:200;font-size:1.9rem;color:var(--blue);letter-spacing:2px;line-height:1}
.pp sub{font-size:1rem;font-weight:300;letter-spacing:0}
.ft{font-size:11px;background:var(--g100);color:var(--g600);padding:3px 9px;border-radius:20px}
.si2{width:60px;height:60px;background:var(--gtint);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.dv{height:1px;background:var(--g100);margin:12px 0}
.pb{display:flex;gap:3px}
.ps{flex:1;height:3px;border-radius:2px;background:var(--g100);transition:background .4s}
.ps.fill{background:var(--blue)}
.ss{font-family:var(--fb);font-size:.8rem;font-weight:500;padding:6px 10px;border-radius:var(--rs);border:1.5px solid var(--g200);background:var(--snow);color:var(--obsidian);cursor:pointer;outline:none;flex:1}
.empty{text-align:center;padding:48px 20px}
/* Profile avatar */
.av{width:64px;height:64px;background:var(--blue-tint);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:300;font-size:1.4rem;color:var(--blue);flex-shrink:0}
/* Tracking stepper */
.trk-step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;position:relative;z-index:1}
.trk-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(--g200)}
.trk-dot.d{background:var(--green);border-color:var(--green)}
.trk-dot.a{background:var(--blue);border-color:var(--blue);box-shadow:0 0 0 4px rgba(45,114,200,.15)}
.trk-dot.p{background:#fff;border-color:var(--g200)}
</style>
</head>
<body>
<div id="app">
  <div class="ls">
    <div class="bw" style="width:52px;height:52px;"><span style="font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:1.5rem;color:#fff;letter-spacing:-1px;">s</span></div>
    <div class="spin" style="width:28px;height:28px;margin-top:8px;"></div>
  </div>
</div>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
'use strict';
const SU='https://xxayiwmobayqafdupjab.supabase.co';
const SK='sb_publishable_poGIKcrcKcnoHTw9MO0GxQ_idyZduwH';
const PKG={
  essential:{id:'essential',name:'Essential',tag:'Wax & Go',price:49,days:3,features:['Heißwachsen','Grundschliff','Kanten entgraten','Bindungscheck']},
  performance:{id:'performance',name:'Performance',tag:'Race-Ready',price:79,days:5,features:['Alles aus Essential','Steinschliff Belag','Kanten schärfen','Fluor-Wachs'],rec:true},
  world_cup:{id:'world_cup',name:'World Cup',tag:'Profi-Tuning',price:119,days:7,features:['Alles aus Performance','Belagserneuerung','Profil-Schliff','Tuning-Zertifikat']}
};
const LOG={
  home:{id:'home',name:'@Home Pickup',icon:'🏠',desc:'DHL holt direkt bei dir ab.',addr:true},
  storebox:{id:'storebox',name:'Storebox Hub',icon:'📦',desc:'24/7 Smart Locker. PIN per E-Mail.',addr:false},
  corporate:{id:'corporate',name:'Corporate Drop-off',icon:'🏔️',desc:'Abgabe beim Partnerhotel / Hub.',addr:false}
};
const SF=[
  {key:'booked',lbl:'Gebucht'},
  {key:'pickup_scheduled',lbl:'Abholung geplant'},
  {key:'dropped_off',lbl:'Abgegeben'},
  {key:'in_service',lbl:'In Bearbeitung'},
  {key:'quality_check',lbl:'Qualitätskontrolle'},
  {key:'ready',lbl:'Fertig — Rücktransport'},
  {key:'completed',lbl:'Abgeschlossen'}
];
const S={
  view:'loading',user:null,profile:null,assets:[],bookings:[],
  loading:false,
  draft:{asset_id:null,asset:null,pkg:'performance',log:'home',addr:'',notes:''},
  na:{brand:'',model:'',len:'',year:'',type:'ski'},
  confirmed:null
};
const db=supabase.createClient(SU,SK);
let rtCh=null;

// Utils
function toast(m,ms=3200){const e=document.getElementById('toast');if(!e)return;e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),ms)}
function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('de-AT',{day:'numeric',month:'short',year:'numeric'})}
function fe(n){return Number(n||0).toFixed(2).replace('.',',')+' €'}
function sl(k){return SF.find(s=>s.key===k)?.lbl||k}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function bc(s){if(['booked','pickup_scheduled','dropped_off','in_transit'].includes(s))return'sb';if(['in_service','quality_check'].includes(s))return'si';if(['ready','return_transit'].includes(s))return'sr';if(s==='cancelled')return'sca';return'sc2'}
function setL(v){S.loading=v;document.querySelectorAll('.bp').forEach(b=>b.disabled=v)}
function initials(n,e){if(n){const p=n.split(' ');return(p[0]?.[0]||'')+(p[1]?.[0]||'');} return(e?.[0]||'').toUpperCase()}

// Nav
function bnav(a){
  const items=[
    {k:'home',l:'Home',i:`<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`},
    {k:'book-1',l:'Buchen',i:`<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>`},
    {k:'my-bookings',l:'Aufträge',i:`<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>`},
    {k:'profile',l:'Profil',i:`<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`}
  ];
  return`<nav class="bn">${items.map(x=>`<button class="ni ${a===x.k?'on':''}" onclick="A.nav('${x.k}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${x.i}</svg>${x.l}</button>`).join('')}</nav>`
}
function steps(n){return`<div class="sts">${[1,2,3,4].map((x,i)=>(i>0?`<div class="sl2 ${x<=n?'d':''}"></div>`:'')+`<div class="sd2 ${x<n?'d':x===n?'a':'p'}">${x<n?'✓':x}</div>`).join('')}</div>`}
function pbar(st){const keys=SF.map(s=>s.key);const idx=keys.indexOf(st);return`<div class="pb">${SF.slice(0,5).map((_,i)=>`<div class="ps ${i<=idx?'fill':''}"></div>`).join('')}</div>`}

// ── VIEWS ────────────────────────────────────────────────────

function vAuth(){return`<div class="aw">
<div class="bw" style="width:64px;height:64px;margin-bottom:20px;"><span style="font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:2rem;color:#fff;letter-spacing:-2px;">s</span></div>
<div class="lt" style="margin-bottom:6px;">slopy</div>
<p class="mu" style="margin-bottom:28px;font-size:.875rem;">Das Betriebssystem für dein Ski-Equipment.</p>
<div style="width:100%;max-width:300px;">
<div class="ig"><label class="il">E-Mail</label><input id="ei" class="inp" type="email" placeholder="du@beispiel.at" autocomplete="email"></div>
<div class="ig"><label class="il">Passwort</label><input id="pi" class="inp" type="password" placeholder="Mindestens 6 Zeichen" onkeydown="if(event.key==='Enter')A.login()"></div>
<button class="btn bp" onclick="A.login()" style="margin-bottom:10px;">${S.loading?'<div class="spin" style="width:16px;height:16px;border-width:2px;"></div>':'Einloggen'}</button>
<button class="btn bg" onclick="A.register()">${S.loading?'<div class="spin" style="width:16px;height:16px;border-width:2px;"></div>':'Neu registrieren'}</button>
</div></div>`}

function vHome(){
  const name=S.profile?.full_name?.split(' ')[0]||S.user?.email?.split('@')[0]||'dort';
  const act=S.bookings.find(b=>!['completed','cancelled'].includes(b.status));
  const h=new Date().getHours();
  const gr=h<12?'Guten Morgen':h<18?'Guten Tag':'Guten Abend';
  return`<div class="tb"><div class="tbt">slopy</div><button class="btn bsm bs" onclick="A.nav('profile')" style="padding:5px 12px;display:flex;align-items:center;gap:7px;"><div class="av" style="width:28px;height:28px;font-size:.75rem;">${initials(S.profile?.full_name,S.user?.email)}</div>${esc(name)}</button></div>
<div class="sc">
<div style="margin-bottom:24px;"><div class="lbl" style="margin-bottom:4px;">${gr}</div><div class="hl">${esc(name)}</div></div>
${act?`<div class="card" style="border-color:var(--blue);background:var(--blue-tint);cursor:pointer;margin-bottom:20px;" onclick="A.nav('my-bookings')">
<div class="lbl" style="margin-bottom:8px;">Aktiver Auftrag</div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
<div><div style="font-weight:500;">${esc(act.assets?.brand||'')} ${esc(act.assets?.model||'')}</div><div class="mu" style="font-size:.78rem;">${PKG[act.service_package]?.name}</div></div>
<span class="badge ${bc(act.status)}">${sl(act.status)}</span></div>
${pbar(act.status)}
<div class="mu" style="font-size:.75rem;margin-top:8px;">Fertig ca. ${fd(act.estimated_completion)}</div>
</div>`:''}
${S.assets.length===0?`<div class="card" style="text-align:center;padding:24px;background:var(--snow);border-style:dashed;"><div style="font-size:2.5rem;margin-bottom:10px;">🎿</div><div style="font-weight:500;margin-bottom:4px;">Noch kein Equipment</div><p class="mu" style="font-size:.85rem;margin-bottom:16px;">Füg deinen ersten Ski hinzu.</p><button class="btn bp" onclick="A.nav('book-1')">Ski hinzufügen</button></div>`:
`<div style="margin-bottom:20px;"><div class="lbl" style="margin-bottom:10px;">Mein Equipment (${S.assets.length})</div>
${S.assets.map(a=>`<div class="card" style="margin-bottom:8px;">
<div style="display:flex;align-items:center;gap:12px;">
<div style="width:40px;height:40px;background:var(--blue-tint);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;">🎿</div>
<div style="flex:1;">
<div style="font-weight:500;">${esc(a.brand)} ${esc(a.model)}</div>
<div class="mu" style="font-size:.78rem;">${a.length_cm?a.length_cm+' cm · ':''} ${a.year||''}
</div></div>
<div style="text-align:right;">
<div style="font-size:11px;color:var(--g600);margin-bottom:2px;">Health</div>
<div style="font-weight:500;color:${a.edge_health<50?'var(--amber)':'var(--green)'};">${Math.round((a.edge_health+a.base_health+a.wax_health)/3)}%</div>
</div></div></div>`).join('')}
</div>`}
<button class="btn bp" onclick="A.nav('book-1')" style="margin-bottom:10px;">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
Service buchen</button>
</div>${bnav('home')}`}

function vProfile(){
  const p=S.profile;
  const ini=initials(p?.full_name,S.user?.email);
  return`<div class="tb"><button class="bb" onclick="A.nav('home')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Zurück</button><div class="tbt">profil</div><div></div></div>
<div class="sc">
<div style="display:flex;flex-direction:column;align-items:center;margin-bottom:28px;gap:12px;">
<div class="av" style="width:72px;height:72px;font-size:1.6rem;">${ini}</div>
<div style="text-align:center;">
<div style="font-weight:500;font-size:1rem;">${esc(p?.full_name||'—')}</div>
<div class="mu" style="font-size:.85rem;">${esc(S.user?.email||'')}</div>
<div style="margin-top:6px;"><span class="badge" style="background:var(--blue-tint);color:var(--blue);">${p?.role==='admin'?'Admin':'Kunde'}</span></div>
</div></div>

<div class="lbl" style="margin-bottom:12px;">Profil bearbeiten</div>
<div class="ig"><label class="il">Vollständiger Name</label><input id="fn" class="inp" type="text" value="${esc(p?.full_name||'')}" placeholder="Vor- und Nachname"></div>
<div class="ig"><label class="il">Telefon</label><input id="ph" class="inp" type="tel" value="${esc(p?.phone||'')}" placeholder="+43 123 456 789" inputmode="tel"></div>
<div class="ig"><label class="il">E-Mail</label><input class="inp" type="email" value="${esc(S.user?.email||'')}" disabled style="opacity:.6;cursor:not-allowed;"></div>
<button class="btn bp" onclick="A.saveProfile()" style="margin-bottom:10px;">${S.loading?'<div class="spin" style="width:16px;height:16px;border-width:2px;"></div>':'Speichern'}</button>

<div class="dv"></div>
<div class="lbl" style="margin-bottom:12px;">Account</div>
<div style="background:var(--snow);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;">
<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--g100);">
<span class="mu">Mitglied seit</span><span style="font-size:.85rem;font-weight:500;">${fd(S.user?.created_at)}</span></div>
<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--g100);">
<span class="mu">Buchungen gesamt</span><span style="font-size:.85rem;font-weight:500;">${S.bookings.length}</span></div>
<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;">
<span class="mu">Equipment</span><span style="font-size:.85rem;font-weight:500;">${S.assets.length} Ski</span></div>
</div>
<button class="btn" style="background:var(--rtint);color:var(--red);margin-top:4px;" onclick="A.logout()">Ausloggen</button>
</div>${bnav('profile')}`}

function vBook1(){return`<div class="tb"><button class="bb" onclick="A.nav('home')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Zurück</button><div class="tbt">buchen</div><div></div></div>
<div class="sc">${steps(1)}<div class="lbl" style="margin-bottom:14px;">Welcher Ski?</div>
${S.assets.map(a=>`<div class="card cs ${S.draft.asset_id===a.id?'on':''}" onclick="A.selectAsset('${a.id}')">
<div style="display:flex;align-items:center;gap:12px;">
<div style="font-size:1.4rem;">🎿</div>
<div style="flex:1;"><div style="font-weight:500;">${esc(a.brand)} ${esc(a.model)}</div>
<div class="mu" style="font-size:.78rem;">${a.length_cm?a.length_cm+' cm ':''} ${a.year||''}</div></div>
${S.draft.asset_id===a.id?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>':''}
</div></div>`).join('')}
<button class="btn bg" onclick="A.go('book-asset')" style="margin-bottom:14px;">
<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
${S.assets.length===0?'Ski hinzufügen':'Anderen Ski hinzufügen'}</button>

// ── ROUTER ────────────────────────────────────────────────
function go(view){
  S.view=view;
  if(rtCh){db.removeChannel(rtCh);rtCh=null}
  const app=document.getElementById('app');
  if(!app)return;
  if(view.startsWith('tracking-')){
    const bid=view.replace('tracking-','');
    app.innerHTML=vTracking(bid);
  } else {
    switch(view){
      case 'auth':app.innerHTML=vAuth();break;
      case 'home':app.innerHTML=vHome();subUser();break;
      case 'profile':app.innerHTML=vProfile();break;
      case 'book-1':app.innerHTML=vBook1();break;
      case 'book-asset':app.innerHTML=vBookAsset();break;
      case 'book-2':app.innerHTML=vBook2();break;
      case 'book-3':app.innerHTML=vBook3();break;
      case 'book-4':app.innerHTML=vBook4();break;
      case 'book-confirm':app.innerHTML=vBookConfirm();break;
      case 'my-bookings':app.innerHTML=vMyBookings();subUser();break;
      case 'admin':app.innerHTML=vAdmin();subAdmin();break;
      default:app.innerHTML=vAuth();
    }
  }
  window.scrollTo(0,0);
}

// ── REALTIME ──────────────────────────────────────────────
function subUser(){
  if(!S.user||rtCh)return;
  rtCh=db.channel('rt-user')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'bookings',filter:`user_id=eq.${S.user.id}`},p=>{
      S.bookings=S.bookings.map(b=>b.id===p.new.id?{...b,...p.new}:b);
      toast('Status aktualisiert: '+sl(p.new.status));
      go(S.view);
    }).subscribe()
}
function subAdmin(){
  if(rtCh)return;
  rtCh=db.channel('rt-admin')
    .on('postgres_changes',{event:'*',schema:'public',table:'bookings'},async p=>{
      if(p.eventType==='INSERT'){
        const{data}=await db.from('bookings').select('*,assets(*),profiles(*)').eq('id',p.new.id).single();
        if(data)S.bookings.unshift(data);
        toast('Neue Buchung eingegangen!');
      } else if(p.eventType==='UPDATE'){
        S.bookings=S.bookings.map(b=>b.id===p.new.id?{...b,...p.new}:b);
      }
      go('admin');
    }).subscribe()
}

// ── AUTH ──────────────────────────────────────────────────
async function login(){
  const e=document.getElementById('ei')?.value?.trim();
  const p=document.getElementById('pi')?.value;
  if(!e||!p){toast('E-Mail und Passwort eingeben');return}
  setL(true);
  const{error}=await db.auth.signInWithPassword({email:e,password:p});
  setL(false);
  if(error){toast('Falsche E-Mail oder falsches Passwort');return}
}
async function register(){
  const e=document.getElementById('ei')?.value?.trim();
  const p=document.getElementById('pi')?.value;
  if(!e||!p){toast('E-Mail und Passwort eingeben');return}
  if(p.length<6){toast('Passwort min. 6 Zeichen');return}
  setL(true);
  const{error}=await db.auth.signUp({email:e,password:p});
  setL(false);
  if(error){toast('Fehler: '+error.message);return}
  toast('Konto erstellt!')
}
async function logout(){
  if(rtCh){db.removeChannel(rtCh);rtCh=null}
  await db.auth.signOut();
  S.user=null;S.profile=null;S.assets=[];S.bookings=[];
  go('auth')
}

// ── DATA ──────────────────────────────────────────────────
async function loadProfile(u){
  S.user=u;
  const{data}=await db.from('profiles').select('*').eq('id',u.id).single();
  if(data){S.profile=data;return}
  const{data:c}=await db.from('profiles').upsert({id:u.id,email:u.email}).select().single();
  S.profile=c
}
async function loadAssets(){if(!S.user)return;const{data}=await db.from('assets').select('*').eq('user_id',S.user.id).order('created_at',{ascending:false});S.assets=data||[]}
async function loadMyBookings(){if(!S.user)return;const{data}=await db.from('bookings').select('*,assets(*)').eq('user_id',S.user.id).order('created_at',{ascending:false});S.bookings=data||[]}
async function loadAllBookings(){const{data}=await db.from('bookings').select('*,assets(*),profiles(*)').order('created_at',{ascending:false});S.bookings=data||[]}

async function addAsset(){
  const a=S.na;
  if(!a.brand.trim()||!a.model.trim()){toast('Marke und Modell sind Pflichtfelder');return}
  setL(true);
  const{data,error}=await db.from('assets').insert({user_id:S.user.id,type:'ski',brand:a.brand.trim(),model:a.model.trim(),length_cm:a.len?parseInt(a.len):null,year:a.year?parseInt(a.year):null}).select().single();
  setL(false);
  if(error){toast('Fehler: '+error.message);return}
  S.assets.unshift(data);S.draft.asset_id=data.id;S.draft.asset=data;
  S.na={brand:'',model:'',len:'',year:'',type:'ski'};
  toast('Ski gespeichert');go('book-2')
}

async function createBooking(){
  if(!S.draft.asset_id){toast('Bitte Ski auswählen');return}
  const p=PKG[S.draft.pkg];if(!p)return;
  setL(true);
  const est=new Date();est.setDate(est.getDate()+p.days+2);
  const{data,error}=await db.from('bookings').insert({user_id:S.user.id,asset_id:S.draft.asset_id,service_package:S.draft.pkg,logistics_type:S.draft.log,logistics_address:S.draft.addr||null,logistics_notes:S.draft.notes||null,price:p.price,status:'booked',estimated_completion:est.toISOString().split('T')[0]}).select().single();
  setL(false);
  if(error){toast('Fehler: '+error.message);return}
  S.bookings.unshift({...data,assets:S.draft.asset});
  S.confirmed={...data,assets:S.draft.asset};
  go('book-confirm')
}

async function updateStatus(id,ns){
  if(!ns)return;
  const{error}=await db.from('bookings').update({status:ns}).eq('id',id);
  if(error){toast('Fehler');return}
  S.bookings=S.bookings.map(b=>b.id===id?{...b,status:ns}:b);
  toast('Status: '+sl(ns));
  go('admin')
}

async function saveProfile(){
  const fn=document.getElementById('fn')?.value?.trim();
  const ph=document.getElementById('ph')?.value?.trim();
  setL(true);
  const{error}=await db.from('profiles').update({full_name:fn||null,phone:ph||null}).eq('id',S.user.id);
  setL(false);
  if(error){toast('Fehler: '+error.message);return}
  S.profile={...S.profile,full_name:fn,phone:ph};
  toast('Profil gespeichert');
  go('profile')
}

// ── GLOBAL API ────────────────────────────────────────────
window.A={
  go,login,register,logout,addAsset,createBooking,updateStatus,saveProfile,
  selectAsset(id){S.draft.asset_id=id;S.draft.asset=S.assets.find(a=>a.id===id);go('book-1')},
  selectPkg(id){S.draft.pkg=id;go('book-2')},
  selectLog(id){S.draft.log=id;go('book-3')},
  setD(k,v){S.draft[k]=v},
  setNA(k,v){S.na[k]=v},
  async nav(v){
    if(rtCh){db.removeChannel(rtCh);rtCh=null}
    if(v==='home'){await loadAssets();await loadMyBookings();go('home')}
    else if(v==='book-1'){await loadAssets();S.draft={asset_id:null,asset:null,pkg:'performance',log:'home',addr:'',notes:''};go('book-1')}
    else if(v==='my-bookings'){await loadMyBookings();go('my-bookings')}
    else if(v==='profile'){await loadAssets();await loadMyBookings();go('profile')}
    else if(v==='admin'){await loadAllBookings();go('admin')}
    else go(v)
  }
};

// ── INIT ──────────────────────────────────────────────────
async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(session){
    await loadProfile(session.user);
    await loadAssets();
    await loadMyBookings();
    if(S.profile?.role==='admin'){await loadAllBookings();go('admin')}
    else go('home')
  } else go('auth');
  db.auth.onAuthStateChange(async(ev,session)=>{
    if(ev==='SIGNED_IN'&&session){
      await loadProfile(session.user);
      await loadAssets();
      await loadMyBookings();
      if(S.profile?.role==='admin'){await loadAllBookings();go('admin')}
      else go('home')
    } else if(ev==='SIGNED_OUT') go('auth')
  })
}
init();
</script>
