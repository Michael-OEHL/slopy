<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Slopy</title>
<meta name="theme-color" content="#2D72C8">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2D72C8;--blue-dark:#1a5ba8;--blue-tint:#EBF2FB;--blue-soft:rgba(45,114,200,.08);
  --obsidian:#14141A;--snow:#F7F8FA;--white:#FFFFFF;
  --g50:#F9FAFB;--g100:#F0F2F5;--g200:#E2E6EA;--g300:#C8CDD4;--g400:#9AA3AE;--g500:#6B7684;--g600:#5A6472;
  --green:#16A34A;--green-tint:#DCFCE7;--amber:#D97706;--amber-tint:#FEF3C7;--red:#DC2626;--red-tint:#FEE2E2;
  --r:12px;--rs:8px;--fd:'Josefin Sans',sans-serif;--fb:'Inter',sans-serif;
}
/* ── DARK MODE ─────────────────────────────────── */
.dark{
  --blue:#4d9cf8;--blue-tint:rgba(77,156,248,.12);--blue-soft:rgba(77,156,248,.08);
  --obsidian:#e8eaf0;--snow:#0f1117;--white:#171b24;
  --g50:#13161e;--g100:#1a1e28;--g200:#222836;--g300:#2d3444;--g400:#6b7684;--g500:#8a94a0;--g600:#a0aab4;
  --green:#22c55e;--green-tint:rgba(34,197,94,.12);--amber:#f59e0b;--amber-tint:rgba(245,158,11,.12);--red:#ef4444;--red-tint:rgba(239,68,68,.12);
}
html,body{height:100%;background:var(--snow);color:var(--obsidian);font-family:var(--fb);font-size:16px;line-height:1.5;transition:background .2s,color .2s}
#app{max-width:900px;margin:0 auto;min-height:100vh;background:var(--white);position:relative;overflow-x:hidden;transition:background .2s}
@media(min-width:900px){body{background:var(--g100)}.dark body{background:#080a0f}#app{box-shadow:0 0 60px rgba(0,0,0,.1)}}

/* ── TYPOGRAPHY ─────────────────────────────────── */
.page-title{font-family:var(--fd);font-weight:200;font-size:1.5rem;letter-spacing:.04em;margin-bottom:16px}
.section-label{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g500);margin-bottom:10px}
.il{display:block;font-size:.75rem;font-weight:500;color:var(--g500);margin-bottom:5px;letter-spacing:.02em}

/* ── LAYOUT ─────────────────────────────────────── */
.screen{padding:16px 18px 120px}
.screen.admin{padding:16px 18px 40px}
@media(min-width:600px){.screen{padding:28px 32px 120px}.screen.admin{padding:28px 32px 40px}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.divider{height:1px;background:var(--g100);margin:16px 0}

/* ── TOPBAR ─────────────────────────────────────── */
.topbar{height:56px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:var(--white);border-bottom:1px solid var(--g100);position:sticky;top:0;z-index:50;transition:background .2s,border-color .2s}
.topbar-logo{display:flex;align-items:center;gap:8px}
.topbar-wordmark{font-family:var(--fd);font-weight:200;font-size:1rem;letter-spacing:6px;color:var(--blue);text-transform:lowercase}
.topbar-title{font-family:var(--fd);font-weight:200;font-size:.82rem;letter-spacing:.12em;text-transform:lowercase;color:var(--g500)}
.topbar-actions{display:flex;align-items:center;gap:6px}
.back-btn{background:none;border:none;cursor:pointer;color:var(--g500);padding:6px;border-radius:var(--rs);display:flex;align-items:center;gap:4px;font-size:.82rem;transition:color .15s}
.back-btn:hover{color:var(--blue)}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--g500);padding:6px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;transition:all .15s;width:32px;height:32px}
.icon-btn:hover{background:var(--g100);color:var(--obsidian)}
.lang-chip{font-size:.7rem;font-weight:600;letter-spacing:.06em;background:var(--g100);color:var(--g500);border:none;border-radius:4px;padding:4px 8px;cursor:pointer;transition:all .15s}
.lang-chip:hover{background:var(--blue-tint);color:var(--blue)}

/* ── ADMIN TOPBAR ───────────────────────────────── */
.admin-topbar{height:56px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:var(--obsidian);position:sticky;top:0;z-index:50}
.admin-logo{display:flex;align-items:center;gap:8px}
.admin-wordmark{font-family:var(--fd);font-weight:200;font-size:.9rem;letter-spacing:6px;color:#fff;text-transform:lowercase}
.admin-badge{font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:rgba(45,114,200,.25);color:#7eb3f0;padding:3px 8px;border-radius:3px;border:1px solid rgba(45,114,200,.3)}
.admin-btn-xs{font-size:.72rem;padding:5px 10px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12);border-radius:var(--rs);cursor:pointer;transition:all .15s;white-space:nowrap}
.admin-btn-xs:hover{background:rgba(255,255,255,.15)}

/* ── BOTTOM NAV ─────────────────────────────────── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:900px;background:var(--white);border-top:1px solid var(--g100);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);transition:background .2s,border-color .2s}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:none;cursor:pointer;color:var(--g400);font-size:10px;font-weight:500;font-family:var(--fb);transition:color .15s;position:relative}
.nav-item svg{width:22px;height:22px;stroke-width:1.8}
.nav-item.active{color:var(--blue)}
.nav-dot{position:absolute;top:6px;right:calc(50% - 14px);width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--white)}

/* ── CARDS ──────────────────────────────────────── */
.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:16px;transition:border-color .15s,background .2s}
.card-tap{cursor:pointer}.card-tap:hover{border-color:var(--blue);background:var(--blue-soft)}
.card-tap:active{transform:scale(.99)}

/* ── BUTTONS ─────────────────────────────────────── */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-family:var(--fb);font-size:.875rem;font-weight:500;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:var(--blue-tint);color:var(--blue)}.btn-secondary:hover{background:#dce9f8}
.btn-ghost{background:var(--g100);color:var(--g600)}.btn-ghost:hover{background:var(--g200)}
.btn-danger{background:var(--red-tint);color:var(--red)}.btn-danger:hover{background:#fecaca}
.btn-sm{padding:8px 14px;font-size:.8rem;width:auto}
.btn-xs{padding:5px 10px;font-size:.72rem;width:auto}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FORM ────────────────────────────────────────── */
.field{margin-bottom:14px}
.input{width:100%;padding:11px 13px;border:1.5px solid var(--g200);border-radius:var(--rs);font-family:var(--fb);font-size:.9rem;color:var(--obsidian);background:var(--snow);outline:none;transition:border-color .15s,background .2s}
.input:focus{border-color:var(--blue);background:var(--white)}
textarea.input{resize:vertical;min-height:70px}
select.input{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B7684' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}

/* ── BADGES ──────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600;letter-spacing:.04em;white-space:nowrap}
.badge-blue{background:var(--blue-tint);color:var(--blue)}
.badge-green{background:var(--green-tint);color:var(--green)}
.badge-amber{background:var(--amber-tint);color:var(--amber)}
.badge-red{background:var(--red-tint);color:var(--red)}
.badge-grey{background:var(--g100);color:var(--g500)}

/* ── AVATAR ──────────────────────────────────────── */
.avatar{width:38px;height:38px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:300;font-size:.9rem;letter-spacing:.04em;flex-shrink:0;cursor:pointer;text-decoration:none}

/* ── PROGRESS ─────────────────────────────────────── */
.progress-track{height:4px;background:var(--g100);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:2px;background:var(--blue);transition:width .4s ease}

/* ── HEALTH RINGS ────────────────────────────────── */
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.ring-label{font-size:.68rem;color:var(--g500);font-weight:500;text-transform:uppercase;letter-spacing:.06em}

/* ── AUTOCOMPLETE ────────────────────────────────── */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;z-index:200;background:var(--white);border:1.5px solid var(--blue);border-top:none;border-radius:0 0 var(--rs) var(--rs);max-height:200px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.1)}
.ac-item{padding:10px 13px;font-size:.875rem;cursor:pointer;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item:focus{background:var(--blue-tint);outline:none}
.ac-pop{font-size:.62rem;background:var(--blue-tint);color:var(--blue);padding:2px 6px;border-radius:2px}

/* ── STEPS INDICATOR ────────────────────────────── */
.steps{display:flex;gap:6px;margin-bottom:20px}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--g200);transition:background .3s}
.step-dot.done{background:var(--blue)}

/* ── ONBOARDING ──────────────────────────────────── */
.ob-wrap{min-height:100vh;display:flex;flex-direction:column;background:var(--white)}
.ob-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center}
.ob-icon{font-size:4rem;margin-bottom:20px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.ob-title{font-family:var(--fd);font-weight:200;font-size:1.8rem;letter-spacing:.04em;margin-bottom:10px;line-height:1.2;color:var(--obsidian)}
.ob-body-text{font-size:.9rem;color:var(--g500);line-height:1.75;max-width:280px;margin-bottom:0}
.ob-footer{padding:20px 24px calc(24px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px}

/* ── AUTH ────────────────────────────────────────── */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center;background:var(--white)}
.auth-form{width:100%;max-width:340px;text-align:left}

/* ── BOOKING STEPS ───────────────────────────────── */
.pkg-card{border:2px solid var(--g200);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s;position:relative;margin-bottom:10px}
.pkg-card.sel{border-color:var(--blue);background:var(--blue-soft)}
.pkg-card.rec::after{content:'Empfohlen';position:absolute;top:-1px;right:14px;background:var(--blue);color:#fff;font-size:.6rem;font-weight:600;letter-spacing:.06em;padding:3px 10px;border-radius:0 0 6px 6px}
.log-card{border:1.5px solid var(--g200);border-radius:var(--rs);padding:13px 14px;cursor:pointer;transition:all .15s;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.log-card.sel{border-color:var(--blue);background:var(--blue-soft)}
.asset-check{display:flex;align-items:center;gap:10px;padding:13px 14px;border:1.5px solid var(--g200);border-radius:var(--r);cursor:pointer;transition:all .15s;margin-bottom:8px}
.asset-check.sel{border-color:var(--blue);background:var(--blue-soft)}
.check-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--g300);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.check-box.on{background:var(--blue);border-color:var(--blue)}

/* ── ADMIN ───────────────────────────────────────── */
.admin-screen{background:var(--snow);min-height:calc(100vh - 56px);padding:20px 18px 40px;transition:background .2s}
@media(min-width:600px){.admin-screen{padding:28px 32px 40px}}
.admin-kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:500px){.admin-kpi-grid{grid-template-columns:repeat(4,1fr)}}
.admin-kpi{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:14px;transition:background .2s,border-color .2s}
.admin-kpi-val{font-family:var(--fd);font-weight:200;font-size:1.6rem;letter-spacing:.02em;color:var(--blue);line-height:1;margin-bottom:3px}
.admin-kpi-lbl{font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g500)}
.admin-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:8px;transition:background .2s,border-color .2s}
.admin-tabs{display:flex;border-bottom:1px solid var(--g200);margin-bottom:14px}
.admin-tab{flex:1;padding:10px 6px;background:none;border:none;cursor:pointer;font-size:.8rem;font-weight:500;color:var(--g500);border-bottom:2px solid transparent;transition:all .15s;text-align:center;font-family:var(--fb)}
.admin-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{font-size:.75rem;font-weight:500;padding:6px 12px;border-radius:20px;border:1.5px solid var(--g200);background:var(--white);color:var(--g600);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.filter-chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.status-select{flex:1;padding:8px 10px;border:1.5px solid var(--g200);border-radius:var(--rs);font-family:var(--fb);font-size:.8rem;background:var(--snow);color:var(--obsidian);cursor:pointer;outline:none;transition:border-color .15s}
.status-select:focus{border-color:var(--blue)}

/* ── CHARTS ──────────────────────────────────────── */
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:100px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}
.bar-seg{width:100%;border-radius:3px 3px 0 0;min-height:3px;cursor:pointer;transition:opacity .2s}
.bar-seg:hover{opacity:.8}
.bar-euro{font-size:8px;color:var(--g500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center}
.bar-month{font-size:9px;color:var(--g500)}
.horiz-bar{height:6px;background:var(--g100);border-radius:3px;overflow:hidden;margin-top:4px}
.horiz-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .6s ease}

/* ── CORPORATE ───────────────────────────────────── */
.corp-wrap{min-height:100vh;background:var(--obsidian);transition:background .2s}
.dark .corp-wrap{background:#080a0f}
.corp-topbar{height:56px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
.corp-screen{padding:20px 18px 60px}
@media(min-width:600px){.corp-screen{padding:28px 32px 60px}}
.corp-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:border-color .15s}
.corp-card:hover{border-color:rgba(45,114,200,.3)}
.corp-kpi{background:rgba(45,114,200,.08);border:1px solid rgba(45,114,200,.15);border-radius:var(--r);padding:16px;text-align:center}
.corp-kpi-val{font-family:var(--fd);font-weight:200;font-size:1.8rem;color:var(--blue);letter-spacing:.02em;line-height:1;margin-bottom:3px}
.corp-kpi-lbl{font-size:.62rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em}
.health-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:5px}
.health-fill{height:100%;border-radius:2px}
.corp-input{width:100%;padding:11px 13px;border:1px solid rgba(255,255,255,.15);border-radius:var(--rs);font-family:var(--fb);font-size:.9rem;color:#fff;background:rgba(255,255,255,.06);outline:none;transition:border-color .15s}
.corp-input:focus{border-color:var(--blue)}
.corp-input::placeholder{color:rgba(255,255,255,.3)}
select.corp-input{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='rgba(255,255,255,0.4)' stroke-width='1.5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
select.corp-input option{background:#1a1e28;color:#fff}
.corp-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-family:var(--fb);font-size:.875rem;font-weight:500;transition:all .15s}
.corp-btn-primary{background:var(--blue);color:#fff}.corp-btn-primary:hover{background:var(--blue-dark)}
.corp-btn-ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}.corp-btn-ghost:hover{background:rgba(255,255,255,.1)}
.corp-tab{flex:1;padding:10px 6px;background:none;border:none;cursor:pointer;font-size:.78rem;font-weight:500;color:rgba(255,255,255,.35);border-bottom:2px solid transparent;transition:all .15s;text-align:center;font-family:var(--fb)}
.corp-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.corp-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:16px}
.corp-label{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px}
.ski-id{font-family:monospace;font-size:.78rem;font-weight:700;color:var(--blue);background:rgba(45,114,200,.12);padding:3px 8px;border-radius:4px;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:#4ade80}
.status-dot.service{background:var(--blue)}
.status-dot.off{background:rgba(255,255,255,.2)}

/* ── MANAGEMENT ──────────────────────────────────── */
.mgmt-screen{padding:20px 18px 60px;background:var(--snow);min-height:calc(100vh - 56px)}
@media(min-width:600px){.mgmt-screen{padding:28px 32px 60px}}
.kpi-grid-4{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:500px){.kpi-grid-4{grid-template-columns:repeat(4,1fr)}}
.kpi-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:14px;transition:background .2s}
.kpi-val{font-family:var(--fd);font-weight:200;font-size:1.6rem;letter-spacing:.02em;color:var(--blue);line-height:1;margin-bottom:3px}
.kpi-lbl{font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g500)}
.kpi-trend{font-size:.72rem;margin-top:3px}
.trend-up{color:var(--green)}.trend-dn{color:var(--red)}
.price-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--g100)}
.price-input{width:80px;padding:7px 10px;border:1.5px solid var(--g200);border-radius:var(--rs);font-family:var(--fb);font-size:.9rem;font-weight:500;color:var(--blue);text-align:right;background:var(--snow);outline:none;transition:border-color .15s}
.price-input:focus{border-color:var(--blue)}

/* ── HOWTO ───────────────────────────────────────── */
.howto-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;padding:16px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.howto-card{background:var(--white);border-radius:var(--r);padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:slideUp .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.howto-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}

/* ── EMPTY STATE ─────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 20px}
.empty-icon{font-size:3rem;margin-bottom:14px;opacity:.6}

// ── Health Ring SVG ───────────────────────────────────────
function healthRing(val, size=64, label='') {
  const r=size*0.38, c=size/2, circ=2*Math.PI*r;
  const pct=Math.max(0,Math.min(100,val||100));
  const dash=circ*(pct/100), gap=circ*(1-pct/100);
  const col=hColor(pct);
  return `<div class="ring-wrap">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--g200)" stroke-width="${size*0.09}"/>
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${col}" stroke-width="${size*0.09}" stroke-dasharray="${dash} ${gap}" stroke-linecap="round" transform="rotate(-90 ${c} ${c})" style="transition:stroke-dasharray .6s ease"/>
      <text x="${c}" y="${c+4}" text-anchor="middle" fill="${col}" font-family="'Josefin Sans',sans-serif" font-weight="200" font-size="${size*0.22}">${pct}%</text>
    </svg>
    ${label?`<div class="ring-label">${label}</div>`:''}
  </div>`;
}

function vAdminAnalytics() {
  const all = S.bookings;
  const revenue = all.filter(b=>b.status!=='cancelled').reduce((s,b)=>s+Number(b.price||0),0);
  const completed = all.filter(b=>b.status==='completed').length;
  const active = all.filter(b=>!['completed','cancelled'].includes(b.status)).length;
  const avg = all.filter(b=>b.status!=='cancelled').length>0 ? revenue/all.filter(b=>b.status!=='cancelled').length : 0;
  const convRate = all.length>0 ? Math.round((completed/all.length)*100) : 0;

  // Monthly revenue - proper date-sorted
  const mRaw = {};
  all.filter(b=>b.status!=='cancelled').forEach(b=>{
    const d = new Date(b.created_at);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lbl = d.toLocaleDateString('de-AT',{month:'short',year:'2-digit'});
    if(!mRaw[key]) mRaw[key]={lbl,rev:0};
    mRaw[key].rev += Number(b.price||0);
  });
  const mKeys = Object.keys(mRaw).sort().slice(-6);
  const maxRev = Math.max(...mKeys.map(k=>mRaw[k].rev),1);

  // Pkg distribution
  const pDist = {essential:0,performance:0,world_cup:0};
  all.forEach(b=>{if(pDist[b.service_package]!==undefined)pDist[b.service_package]++;});
  const pTotal = Object.values(pDist).reduce((a,b)=>a+b,0)||1;

  // Logistics
  const lDist = {};
  all.forEach(b=>{lDist[b.logistics_type]=(lDist[b.logistics_type]||0)+1;});

  return `${adminTopbar('Analytics', "A.nav('admin')")}
  <div class="admin-screen fade-up">
    <div class="admin-kpi-grid">
      <div class="admin-kpi"><div class="admin-kpi-val">${fmtEur(revenue)}</div><div class="admin-kpi-lbl">Umsatz</div></div>
      <div class="admin-kpi"><div class="admin-kpi-val">${fmtEur(avg)}</div><div class="admin-kpi-lbl">Ø Auftrag</div></div>
      <div class="admin-kpi"><div class="admin-kpi-val">${all.length}</div><div class="admin-kpi-lbl">Buchungen</div></div>
      <div class="admin-kpi"><div class="admin-kpi-val">${convRate}%</div><div class="admin-kpi-lbl">Abschluss</div></div>
    </div>

    ${mKeys.length>0?`
      <div class="admin-card" style="margin-bottom:10px;">
        <div class="section-label">Umsatz nach Monat</div>
        <div class="bar-chart">
          ${mKeys.map(k=>{
            const m=mRaw[k], pct=Math.max(Math.round((m.rev/maxRev)*100),3);
            return `<div class="bar-col">
              <div class="bar-euro">${m.rev>0?Math.round(m.rev)+'€':''}</div>
              <div class="bar-seg" style="height:${pct}%;background:var(--blue);opacity:${0.5+pct/200};" title="${fmtEur(m.rev)}"></div>
              <div class="bar-month">${m.lbl}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`:''}

    ${pTotal>0?`
      <div class="admin-card" style="margin-bottom:10px;">
        <div class="section-label">Paket-Mix</div>
        <div style="height:10px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:8px;">
          <div style="width:${Math.round((pDist.essential/pTotal)*100)}%;background:#4d9cf8;"></div>
          <div style="width:${Math.round((pDist.performance/pTotal)*100)}%;background:#2D72C8;"></div>
          <div style="width:${Math.round((pDist.world_cup/pTotal)*100)}%;background:#1a5ba8;"></div>
        </div>
        <div style="display:flex;gap:12px;font-size:.72rem;color:var(--g600);">
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#4d9cf8;display:inline-block;"></span>Essential ${Math.round((pDist.essential/pTotal)*100)}%</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#2D72C8;display:inline-block;"></span>Performance ${Math.round((pDist.performance/pTotal)*100)}%</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#1a5ba8;display:inline-block;"></span>World Cup ${Math.round((pDist.world_cup/pTotal)*100)}%</span>
        </div>
      </div>`:''}

    <div class="admin-card">
      <div class="section-label">Logistik-Kanäle</div>
      ${Object.entries(lDist).map(([type,count])=>{
        const pct = Math.round((count/all.length)*100);
        return `<div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:4px;"><span>${LOG[type]?.name||type}</span><span style="font-weight:500;">${count} (${pct}%)</span></div>
          <div class="horiz-bar"><div class="horiz-fill" style="width:${pct}%;"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function vAdminCapacity() {
  const today = new Date();
  const year = today.getFullYear(), month = today.getMonth();
  const daysInMonth = new Date(year,month+1,0).getDate();

  const MAX = 8;
  const counts = {};
  S.bookings.forEach(b=>{
    if(['completed','cancelled'].includes(b.status)||!b.estimated_completion) return;
    const d = new Date(b.estimated_completion);
    if(d.getMonth()===month&&d.getFullYear()===year) counts[d.getDate()]=(counts[d.getDate()]||0)+1;
  });
  const monthName = today.toLocaleDateString('de-AT',{month:'long',year:'numeric'});
  const days=['Mo','Di','Mi','Do','Fr','Sa','So'];

  return `${adminTopbar('Kapazität', "A.nav('admin')")}

    </div>

      <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:var(--amber-tint);border-radius:2px;display:inline-block;"></span>Halb</span>
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:var(--red-tint);border-radius:2px;display:inline-block;"></span>Voll</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">
      ${days.map(d=>`<div style="font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--g500);text-align:center;padding:4px 0;">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div></div>').join('')}
      ${Array.from({length:daysInMonth},(_,i)=>{
        const day=i+1,count=counts[day]||0;
        const isToday=day===today.getDate();
        const isPast=new Date(year,month,day)<new Date(today.toDateString());
        const bg=count===0?'var(--green-tint)':count<MAX*0.6?'var(--green-tint)':count<MAX?'var(--amber-tint)':'var(--red-tint)';
        const col=count===0?'var(--green)':count<MAX*0.6?'var(--green)':count<MAX?'var(--amber)':'var(--red)';
        return `<div style="aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${bg};color:${col};opacity:${isPast?.4:1};${isToday?'box-shadow:0 0 0 2px var(--blue);font-weight:700;':''};cursor:default;">
          <div style="font-size:.78rem;line-height:1;">${day}</div>
          ${count>0?`<div style="font-size:.55rem;margin-top:1px;">${count}/${MAX}</div>`:''}

function vManagement() {
  const all = S.bookings;
  const revenue = all.filter(b=>b.status!=='cancelled').reduce((s,b)=>s+Number(b.price||0),0);
  const completed = all.filter(b=>b.status==='completed').length;
  const active = all.filter(b=>!['completed','cancelled'].includes(b.status)).length;
  const avg = all.filter(b=>b.status!=='cancelled').length>0?revenue/all.filter(b=>b.status!=='cancelled').length:0;
  const convRate = all.length>0?Math.round((completed/all.length)*100):0;
  const mRaw={};
  all.filter(b=>b.status!=='cancelled').forEach(b=>{
    const d=new Date(b.created_at);
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lbl=d.toLocaleDateString('de-AT',{month:'short',year:'2-digit'});
    if(!mRaw[key]) mRaw[key]={lbl,rev:0};
    mRaw[key].rev+=Number(b.price||0);
  });
  const mKeys=Object.keys(mRaw).sort().slice(-6);
  const maxRev=Math.max(...mKeys.map(k=>mRaw[k].rev),1);
  const prices=S.mgmtPrices||{essential:49,performance:79,world_cup:119};

  return `${adminTopbar('Management', "A.nav('admin')")}
  <div class="mgmt-screen fade-up">
    <div class="kpi-grid-4">
      <div class="kpi-card"><div class="kpi-val">${fmtEur(revenue)}</div><div class="kpi-lbl">Umsatz</div><div class="kpi-trend trend-up">↑ gesamt</div></div>
      <div class="kpi-card"><div class="kpi-val">${fmtEur(avg)}</div><div class="kpi-lbl">Ø Auftrag</div><div class="kpi-trend ${avg>=79?'trend-up':'trend-dn'}">${avg>=79?'↑ über Ziel':'↓ unter Ziel'}</div></div>
      <div class="kpi-card"><div class="kpi-val">${all.length}</div><div class="kpi-lbl">Buchungen</div><div class="kpi-trend trend-up">${active} aktiv</div></div>
      <div class="kpi-card"><div class="kpi-val">${convRate}%</div><div class="kpi-lbl">Abschluss</div><div class="kpi-trend ${convRate>=70?'trend-up':'trend-dn'}">${convRate>=70?'↑ gut':'↓ optimierbar'}</div></div>
    </div>

    ${mKeys.length>0?`
      <div class="card" style="margin-bottom:14px;">
        <div class="section-label" style="margin-bottom:10px;">Umsatz nach Monat</div>
        <div class="bar-chart">
          ${mKeys.map(k=>{
            const m=mRaw[k],pct=Math.max(Math.round((m.rev/maxRev)*100),3);
            return `<div class="bar-col">
              <div class="bar-euro">${m.rev>0?Math.round(m.rev)+'€':''}</div>
              <div class="bar-seg" style="height:${pct}%;background:var(--blue);opacity:${0.5+pct/200};"></div>
              <div class="bar-month">${m.lbl}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`:''}

    <div class="card" style="margin-bottom:14px;">
      <div class="section-label" style="margin-bottom:12px;">Preise konfigurieren</div>
      ${Object.values(PKG).map(p=>`
        <div class="price-row">
          <div><div style="font-weight:500;font-size:.88rem;">${p.name}</div><div style="font-size:.72rem;color:var(--g500);">${p.tag}</div></div>
          <div style="display:flex;align-items:center;gap:6px;">
            <input class="price-input" type="number" value="${prices[p.id]||p.price}" onchange="A.updatePrice('${p.id}',this.value)" min="0" max="999">
            <span style="font-size:.82rem;color:var(--g500);">€</span>
          </div>
        </div>`).join('')}
      <button class="btn btn-primary" onclick="A.savePrices()" style="margin-top:12px;font-size:.85rem;">Preise speichern</button>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="section-label" style="margin-bottom:0;">Rabatte</div>
        <button onclick="A.addDiscount()" style="background:var(--blue-tint);color:var(--blue);border:none;border-radius:var(--rs);padding:5px 12px;font-size:.75rem;font-weight:500;cursor:pointer;">+ Rabatt</button>
      </div>
      ${(S.mgmtDiscounts||[]).length===0?`<div style="font-size:.82rem;color:var(--g500);text-align:center;padding:12px 0;">Noch keine Rabatte</div>`:''}
      ${(S.mgmtDiscounts||[]).map((d,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--g100);">
          <div style="flex:1;"><div style="font-size:.875rem;font-weight:500;">${esc(d.name)}</div><div style="font-size:.72rem;color:var(--g500);">${d.value}% Rabatt</div></div>
          <button onclick="A.removeDiscount(${i})" style="background:var(--red-tint);color:var(--red);border:none;border-radius:var(--rs);padding:4px 10px;font-size:.72rem;cursor:pointer;">${t('delete')}</button>
        </div>`).join('')}
    </div>
  </div>
  ${howtoFAB('management')}
  ${howtoOverlay('management')}`;
}

// ════════════════════════════════════════════════════════════
// ROUTER
// ════════════════════════════════════════════════════════════
function go(view) {
  S.view = view; S.showHowTo = false;
  if(rtCh) { db.removeChannel(rtCh); rtCh=null; }
  const app = document.getElementById('app');
  if(!app) return;

  // Demo banner
  app.innerHTML = demoBanner();

  let content = '';
  if(view.startsWith('tracking-'))    content = vTracking(view.replace('tracking-',''));
  else if(view.startsWith('pass-'))   content = vProductPass(view.replace('pass-',''));
  else if(view.startsWith('qr-'))     content = vQRCode(view.replace('qr-',''));
  else if(view.startsWith('rate-'))   { S.rating={bid:view.replace('rate-',''),stars:0}; content=vRating(view.replace('rate-','')); }
  else if(view.startsWith('edit-asset-')) content = vEditAsset(view.replace('edit-asset-',''));
  else if(view.startsWith('cancel-')) content = vCancelBooking(view.replace('cancel-',''));
  else if(view.startsWith('share-'))  content = vShare(view.replace('share-',''));
  else switch(view) {
    case 'auth':           content=vAuth();           break;
    case 'pw-reset':       content=vPwReset();        break;
    case 'onboard':        content=vOnboard();        break;
    case 'home':           content=vHome();           subCustomer(); loadNotifs(); break;
    case 'profile':        content=vProfile();        break;
    case 'notifications':  content=vNotifications();  break;
    case 'health-score':   content=vHealthScore();    break;
    case 'share':          content=vShare();          break;
    case 'book-1':         content=vBook1();          break;
    case 'book-asset':     content=vBookAsset();      break;
    case 'book-2':         content=vBook2();          break;
    case 'book-3':         content=vBook3();          break;
    case 'book-4':         content=vBook4();          break;
    case 'book-confirm':   content=vBookConfirm();    break;
    case 'my-bookings':    content=vMyBookings();     subCustomer(); break;
    case 'admin':          content=vAdmin();          subAdmin(); break;
    case 'admin-analytics':content=vAdminAnalytics(); break;
    case 'admin-capacity': content=vAdminCapacity();  break;
    case 'admin-manual':   content=vAdminManual();    break;
    case 'management':     content=vManagement();     break;
    case 'corp-onboard':   content=vCorpOnboard();    break;
    case 'corp-dashboard': content=vCorpDashboard();  subCorp(); break;
    case 'corp-add-ski':   content=vCorpAddSki();     break;
    case 'dsgvo':          content=vLegal('dsgvo');   break;
    case 'agb':            content=vLegal('agb');     break;
    case 'impressum':      content=vLegal('impressum');break;
    default:               content=vAuth();
  }

  app.innerHTML += content;
  window.scrollTo(0,0);
}

// ════════════════════════════════════════════════════════════
// NAV (async wrapper with data loading)
// ════════════════════════════════════════════════════════════
async function nav(view) {
  if(S.loading) return;
  if(view==='home')              { await loadAssets(); await loadMyBookings(); go('home'); }
  else if(view==='book-1')       { await loadSkiCatalog(); await loadAssets(); S.draft={assets:[],pkg:'performance',log:'home',addr:'',notes:''}; go('book-1'); }
  else if(view==='book-asset')   { await loadSkiCatalog(); go('book-asset'); }
  else if(view==='my-bookings')  { await loadMyBookings(); go('my-bookings'); }
  else if(view==='profile')      { await loadAssets(); await loadMyBookings(); go('profile'); }
  else if(view==='admin')        { await loadAllBookings(); go('admin'); }
  else if(view==='admin-analytics'){await loadAllBookings(); go('admin-analytics'); }
  else if(view==='management')   { await loadAllBookings(); go('management'); }
  else if(view==='corp-dashboard'){await loadCorpData(); go('corp-dashboard'); }
  else if(view==='corp-add-ski') { await loadSkiCatalog(); go('corp-add-ski'); }
  else if(view==='health-score') { await loadAssets(); go('health-score'); }
  else go(view);
}

// DATA LOADING
// ════════════════════════════════════════════════════════════
async function loadProfile(user) {
  S.user=user;
  const {data} = await db.from('profiles').select('*').eq('id',user.id).single();
  if(data){S.profile=data;return;}
  const {data:ins} = await db.from('profiles').insert({id:user.id,email:user.email,role:'customer'}).select().single();
  if(ins){S.profile=ins;return;}
  S.profile={id:user.id,email:user.email,role:'customer'};
}
async function loadAssets() {
  if(!S.user) return;
  const {data} = await db.from('assets').select('*').eq('user_id',S.user.id).order('created_at',{ascending:false});
  S.assets=data||[];
}
async function loadMyBookings() {
  if(!S.user) return;
  const {data} = await db.from('bookings').select('*,assets(*),profiles(*)').eq('user_id',S.user.id).order('created_at',{ascending:false});
  S.bookings=data||[];
}
async function loadAllBookings() {
  const {data} = await db.from('bookings').select('*,assets(*),profiles(*)').order('created_at',{ascending:false});
  S.bookings=data||[];
}
async function loadSkiCatalog() {
  if(S.skiCatalog.length>0) return;
  const {data} = await db.from('ski_catalog').select('*').order('popular',{ascending:false}).order('brand');
  S.skiCatalog=data||[];
}
async function loadCorpData() {
  if(!S.user) return;
  const {data:grp} = await db.from('b2b_groups').select('*').eq('manager_id',S.user.id).single();
  S.corpGroup=grp||null;
  if(grp) {
    const {data:inv} = await db.from('assets').select('*').eq('user_id',S.user.id).order('slopy_id');
    S.corpInventory=inv||[];
    await loadMyBookings();
  }
}

function loadNotifs() {

}

// ════════════════════════════════════════════════════════════
// REALTIME
// ════════════════════════════════════════════════════════════
function subCustomer() {
  if(!S.user||rtCh) return;
  rtCh=db.channel('rt-c').on('postgres_changes',{event:'UPDATE',schema:'public',table:'bookings',filter:`user_id=eq.${S.user.id}`},p=>{
    const old=S.bookings.find(b=>b.id===p.new.id);
    S.bookings=S.bookings.map(b=>b.id===p.new.id?{...b,...p.new}:b);
    if(old){const n={id:Date.now(),booking_id:p.new.id,asset:old.assets?.brand+' '+old.assets?.model,status:p.new.status,time:new Date(),read:false};S.notifications.unshift(n);try{localStorage.setItem('slopy_notifs_'+S.user.id,JSON.stringify(S.notifications.slice(0,20)));}catch(e){}}
    toast('Status: '+slabel(p.new.status));
    if(['home','my-bookings'].includes(S.view)) go(S.view);
  }).subscribe();
}
function subAdmin() {
  if(rtCh) return;
  rtCh=db.channel('rt-a').on('postgres_changes',{event:'*',schema:'public',table:'bookings'},async p=>{
    if(p.eventType==='INSERT'){const{data}=await db.from('bookings').select('*,assets(*),profiles(*)').eq('id',p.new.id).single();if(data)S.bookings.unshift(data);toast('Neue Buchung!');}
    else if(p.eventType==='UPDATE'){S.bookings=S.bookings.map(b=>b.id===p.new.id?{...b,...p.new}:b);}
    go('admin');
  }).subscribe();
}
function subCorp() {
  if(rtCh) return;
  rtCh=db.channel('rt-corp').on('postgres_changes',{event:'UPDATE',schema:'public',table:'bookings',filter:`user_id=eq.${S.user?.id}`},p=>{
    S.bookings=S.bookings.map(b=>b.id===p.new.id?{...b,...p.new}:b);
    go('corp-dashboard');
  }).subscribe();
}

async function addAsset() {
  const brand=(document.getElementById('na-brand')?.value||S.newAsset.brand).trim();
  const model=(document.getElementById('na-model')?.value||S.newAsset.model).trim();
  const len=document.getElementById('na-len')?.value||S.newAsset.len;

async function saveAsset(id) {
  const brand=document.getElementById('ea-brand')?.value?.trim();
  const model=document.getElementById('ea-model')?.value?.trim();
  const len=document.getElementById('ea-len')?.value;
  const year=document.getElementById('ea-year')?.value;
  if(!brand||!model){toast('Marke und Modell Pflichtfelder');return;}
  setL(true);
  const {error}=await db.from('assets').update({brand,model,length_cm:len?parseInt(len):null,year:year?parseInt(year):null}).eq('id',id);
  setL(false);
  if(error){toast('Fehler: '+error.message);return;}

  A.nav('profile');
}
async function deleteAsset(id) {
  const hasActive=S.bookings.some(b=>b.asset_id===id&&!['completed','cancelled'].includes(b.status));
  if(hasActive){toast('Nicht möglich: Aktive Buchung vorhanden');return;}
  if(!confirm('Ski wirklich löschen?')) return;
  setL(true);
  const {error}=await db.from('assets').delete().eq('id',id);
  setL(false);
  if(error){toast('Fehler: '+error.message);return;}
  S.assets=S.assets.filter(a=>a.id!==id);
  toast('Ski gelöscht');
  A.nav('profile');
}
async function createBooking() {
  if(!S.draft.assets||S.draft.assets.length===0){toast('Bitte Ski auswählen');return;}
  const pkg=PKG[S.draft.pkg];
  const est=new Date();est.setDate(est.getDate()+pkg.days+1);
  setL(true);
  let lastBooking=null;
  for(const assetId of S.draft.assets) {
    const {data,error}=await db.from('bookings').insert({user_id:S.user.id,asset_id:assetId,service_package:S.draft.pkg,logistics_type:S.draft.log,logistics_address:S.draft.addr||null,logistics_notes:S.draft.notes||null,price:pkg.price,status:'booked',estimated_completion:est.toISOString().split('T')[0]}).select('*,assets(*),profiles(*)').single();
    if(!error&&data){S.bookings.unshift(data);lastBooking=data;}
  }
  setL(false);
  if(lastBooking){S.confirmed=lastBooking;go('book-confirm');}
  else toast('Fehler beim Anlegen der Buchung');
}
async function cancelBooking(id) {
  setL(true);
  const {error}=await db.from('bookings').update({status:'cancelled'}).eq('id',id);
  setL(false);
  if(error){toast('Fehler: '+error.message);return;}
  S.bookings=S.bookings.map(b=>b.id===id?{...b,status:'cancelled'}:b);
  toast('Buchung storniert');
  A.nav('my-bookings');
}
async function updateStatus(id, newStatus) {
  if(!newStatus) return;
  const old=S.bookings.find(b=>b.id===id);
  const {error}=await db.from('bookings').update({status:newStatus}).eq('id',id);
  if(error){toast('Fehler');return;}
  S.bookings=S.bookings.map(b=>b.id===id?{...b,status:newStatus}:b);
  if(old){const n={id:Date.now(),booking_id:id,asset:old.assets?.brand+' '+old.assets?.model,status:newStatus,time:new Date(),read:false};S.notifications.unshift(n);try{localStorage.setItem('slopy_notifs_'+old.user_id,JSON.stringify(S.notifications.slice(0,20)));}catch(e){}}
  toast('Status: '+slabel(newStatus));
  go('admin');
}

function onBrandInput(val) {
  S.newAsset.brand=val;
  const input=document.getElementById('na-brand')||document.getElementById('cs-brand');
  if(input) input.value=val;
  if(!val||val.length<1){hideAC('brand');return;}
  const brands=[...new Set(S.skiCatalog.map(s=>s.brand))].filter(b=>b.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  const list=document.getElementById('brand-ac');
  if(!list){hideAC('brand');return;}
  if(!brands.length){list.style.display='none';return;}
  list.innerHTML=brands.map(b=>`<div class="ac-item" tabindex="0" onmousedown="A.selectBrand('${b}')">${b}</div>`).join('');
  list.style.display='block';
}
function onModelInput(val) {
  S.newAsset.model=val;
  if(!S.newAsset.brand||val.length<1){hideAC('model');return;}
  const models=S.skiCatalog.filter(s=>s.brand===S.newAsset.brand&&s.model.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  const list=document.getElementById('model-ac');
  if(!list){hideAC('model');return;}
  if(!models.length){list.style.display='none';return;}
  list.innerHTML=models.map(m=>`<div class="ac-item" tabindex="0" onmousedown="A.selectModel('${m.model.replace(/'/g,"\\'")}')"><span>${m.model}</span>${m.popular?'<span class="ac-pop">Beliebt</span>':''}</div>`).join('');
  list.style.display='block';
}

async function submitRating(bid) {
  if(!S.rating.stars){toast('Bitte Sterne wählen');return;}
  const note=document.getElementById('rating-note')?.value?.trim();
  const text=`⭐ ${S.rating.stars}/5${note?' — '+note:''}`;
  setL(true);
  const b=S.bookings.find(x=>x.id===bid);
  const existing=b?.admin_notes||'';
  const newNotes=existing?existing+' | Kundenbewertung: '+text:'Kundenbewertung: '+text;
  const {error}=await db.from('bookings').update({admin_notes:newNotes}).eq('id',bid);
  setL(false);
  if(error){toast('Fehler');return;}
  S.bookings=S.bookings.map(b=>b.id===bid?{...b,admin_notes:newNotes}:b);
  toast('Bewertung gespeichert — Danke!');
  A.nav('my-bookings');
}
function copyShare(text){navigator.clipboard?.writeText(text).then(()=>toast('Kopiert!')).catch(()=>toast('Link: slopy.at'));}

function updatePrice(pkg,val){if(!S.mgmtPrices)S.mgmtPrices={};S.mgmtPrices[pkg]=Number(val);}
function savePrices(){Object.keys(S.mgmtPrices||{}).forEach(k=>{if(PKG[k])PKG[k].price=S.mgmtPrices[k];});toast('Preise gespeichert');go('management');}
function addDiscount(){
  const name=prompt('Rabatt-Name (z.B. Freunde & Familie):');if(!name)return;
  const val=prompt('Rabatt in % (z.B. 20 für 20%):');if(!val||isNaN(val))return;
  if(!S.mgmtDiscounts)S.mgmtDiscounts=[];
  S.mgmtDiscounts.push({name,value:Number(val),type:'percent'});
  toast('Rabatt hinzugefügt');go('management');
}
function removeDiscount(i){S.mgmtDiscounts?.splice(i,1);go('management');}

function rejectCookies(){try{localStorage.setItem('slopy_cookie','rejected');}catch(e){}document.getElementById('cookie-banner')?.classList.remove('show');}

async function demoSwitch(role) {

  const creds={
    customer: {email:'demo-kunde@slopy.at',pass:'SlopDemo2025'},
    admin:    {email:'demo-admin@slopy.at',pass:'SlopDemo2025'},
    management:{email:'demo-admin@slopy.at',pass:'SlopDemo2025'},
    corp:     {email:'hotel@slopy.at',pass:'SlopDemo2025'}
  };

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
async function init() {
  initLang(); initDark();
  const {data:{session}} = await db.auth.getSession();
  if(session) {
    await loadProfile(session.user);
    await loadAssets();
    await loadMyBookings();
    routeByRole();
  } else {
    go('auth');
  }
  db.auth.onAuthStateChange(async (event, session) => {
    if(event==='SIGNED_IN'&&session) {
      await loadProfile(session.user);
      await loadAssets();
      await loadMyBookings();
      routeByRole();
    } else if(event==='SIGNED_OUT') {
      go('auth');
    }
  });
}

function routeByRole() {
  const role = S.demoRole || S.profile?.role;
  if(role==='admin')        { loadAllBookings().then(()=>go('admin')); }
  else if(role==='management') { loadAllBookings().then(()=>go('management')); }
  else if(role==='b2b_manager'||role==='corp') { loadCorpData().then(()=>{if(!S.corpGroup)go('corp-onboard');else go('corp-dashboard');}); }
  else { loadNotifs(); go('onboard'); }
}


function nextOnboard() {
  if(S.onboardStep < 3) { S.onboardStep++; go('onboard'); }
  else { go('home'); }
}
function skipOnboard() {
  go('home');
}

  nextOnboard,skipOnboard,resetOnboarding,demoOn,demoOff,demoSwitch,
  nav(view){nav(view);}
};

init();
